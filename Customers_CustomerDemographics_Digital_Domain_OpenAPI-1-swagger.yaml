    Names:
      required:
      - firstName
      type: object
      properties:
        firstName:
          type: string
          description: The first name of the customer. Also known as first name
          example: Javier
        lastName:
          type: string
          description: The last name of the customer. Also known as last name
          example: de Cuellar
        nameType:
          type: string
          description: "Type of the name. This is a reference data field. Please use\
            \ /v1/utilities/referenceData/{nameType} resource to get valid value of\
            \ this field with description."
          example: LOCAL_NAME
    ErrorResponse:
      required:
      - code
      - type
      type: object

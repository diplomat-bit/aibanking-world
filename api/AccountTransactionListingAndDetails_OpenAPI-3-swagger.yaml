openapi: 3.0.1
info:
  title: AccountTransactionListingAndDetails_OpenAPI
  description: This API is used to retrieve transactions details and history for all
    accounts product.This API is also used to download the transaction details of
    an account in different file formats.
  version: 1.35.0
  x-deployment-reference: "XP-O-CrossProdSvcs-DGL-EA,XP-O-CrossProdSvcs-DGL-EA-TW,XP-O-CrossProdSvcs-DGL-EA-EM"
  x-linked-api: "CrossProductServices_Digital_Orchestration, TransactionDetailedView"
servers:
- url: "https://127.0.0.1/openapi/v1/accounts/{accountId}/transactions"
paths:
  /:
    get:
      tags:
      - Accounts_Account Financials_Account Transactions
      summary: Retrieve Transactions for Specific Account
      description: "This API returns an array of transactions for the specified account.\
        \ For investment transactions such as buying or selling a stock, they will\
        \ be returned in the array investment Transaction. Important! For PSD2, only\
        \ Credit card, Checking and Saving account are returned in the response."
      operationId: TransactionDetails
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/clientDetails"
      - name: x-jws-signature
        in: header
        description: "This field is signature generated when partner sign API payload.This\
          \ signature will be used to validate that the call is coming from a valid\
          \ partner. This signature is a JWT token, which will be validated with partner’\
          s JWK stored in DB"
        required: false
        style: simple
        explode: false
        schema:
          type: string
      - name: transactionStatus
        in: query
        description: "Applicable for credit cards only. This is a reference data field.\
          \ Please use /v1/utilities/referenceData/{transactionStatus} resource to\
          \ get possible value of this field with description."
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: nextStartIndex
        in: query
        description: In some cases there is more data than what can be returned in
          a single response. If there is additional data available a nextStartIndex
          will be returned. Pass the nextStartIndex in your next request to retrieve
          the next set of data.
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: requestSize
        in: query
        description: "Requested number of transactions.The maximum we can provide\
          \ in one response is 50. If nothing is specified, we will return 20. Currently\
          \ this field is not supported."
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: pendingSdnScreeningFlag
        in: query
        description: This flag will be required to trigger FG/FT flow to retrieve
          transactions pending SDN screening.
        required: true
        style: form
        explode: true
        schema:
          type: boolean
      - name: transactionFromDate
        in: query
        description: "Starting range for transaction date in ISO 8601 date format\
          \ 'YYYY-MM-DD'. Date Range: Upto last 12 months for CASA and last 3 Billing\
          \ Cycle for credit card and ready credit accounts. Note :Applicable for\
          \ advance search for  CASA / Ready Credt / Credit Card account products"
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: transactionToDate
        in: query
        description: "End range for transaction date in ISO 8601 date format 'YYYY-MM-DD'.\
          \ Date Range: Upto last 12 months for CASA and last 3 Billing Cycle for\
          \ credit card and ready credit accounts. Note :Applicable for advance search\
          \ for  CASA / Ready Credt / Credit Card account products"
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: amountFrom
        in: query
        description: "Starting range of transaction amount. Note: Applicable for Investment\
          \ accounts"
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: amountTo
        in: query
        description: "End range of transaction amount. Note: Applicable for Investment\
          \ accounts"
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: transactionDescription
        in: query
        description: "Description given to any kind of transaction made by the customer.\
          \ PII data or sensitive information pertaining to account numbers, card\
          \ numbers are not allowed to be sent here."
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDetailsResponse"
        "206":
          description: "Partial success response. This is applicable for scenarios\
            \ where both pending and normal transactions are requested, but with which\
            \ any one of them failed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDetailsResponse"
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr>                        <tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid Parameters</td></tr><tr><td>error</td><td>invalidSearch</td><td>This
            Search criteria is not supported for this Product.</td></tr></tr><tr><td>error</td><td>invalidDateRange</td><td>Date
            range is invalid</td></tr><tr><td>error</td><td>invalidAmountRange</td><td>Amount
            range is invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credentials are missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>resourceNotFound</td><td>Empty
            resource/resource not found</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>businessValidationsFailed</td><td>Business
            validations failed</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents:
    get:
      tags:
      - Accounts_Account Financials_Account Transactions
      summary: Download Transaction Details
      description: "This API is used to download the transaction on the account in\
        \ different formats like pdf, Excel etc."
      operationId: ViewTransactionDetailsDocument
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/clientDetails"
      - name: downloadFormat
        in: query
        description: |-
          This field refer to the fomat in which transaction detials is require to be downloaded.
          This is a reference data field. Please use /v1/utilities/referenceData/{downloadFormat} resource to get valid value of this field with description.
        required: true
        style: form
        explode: true
        schema:
          type: string
      - name: transactionStartDate
        in: query
        description: Starting range for transaction date in ISO 8601 date format 'YYYY-MM-DD'.
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date
      - name: transactionEndDate
        in: query
        description: End range for transaction date in ISO 8601 date format 'YYYY-MM-DD'.
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date
      - name: nextStartIndex
        in: query
        description: In some cases there is more data than what can be returned in
          a single response. If there is additional data available a nextStartIndex
          will be returned. Pass the nextStartIndex in your next request to retrieve
          the next set of data.
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewTransactionDetailsDocumentResponse"
        "204":
          description: No Content
          content: {}
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid Parameters</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credentials are missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>accessNotConfigured</td><td>The
            request operation is not configured to access this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>invalidSearch</td><td>This
            Search criteria is not supported for this Product.</td></tr><tr><td>error</td><td>invalidDateRange</td><td>Date
            range is invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

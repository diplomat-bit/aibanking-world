  /{transactionReferenceId}/details:
    get:
      tags:
      - Accounts_Account Financials_Account Transactions
      summary: Retrieve Additional Transaction Details By Transaction Reference Id
      description: This API is used to retrieve additional transaction details data
        associated with a transaction reference id.
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/clientDetails"
      - name: transactionReferenceId
        in: path
        description: Reference Id to uniquely identify the transaction.This is applicable
          for successful transactions.
        required: true
        style: simple
        explode: false
        schema:
          type: string
      - name: transactionCode
        in: query
        description: Transaction Code specific to the transaction
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDetailedViewResponse"
        "204":
          description: No Content
          content: {}
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ErrorResponse:
      required:
      - code
      - type
      type: object
      properties:
        type:
          type: string
          description: Invalid - Request did not confirm to the specification and
            was unprocessed and rejected. Please fix the value and try again
          enum:
          - error
          - warn
          - invalid
          - fatal
        code:
          type: string
          description: Error code which qualifies the error
        details:
          type: string
          description: Human readable explanation specific to the occurrence of the
            problem
        location:
          type: string
          description: The name of the field that resulted in the error
        moreInfo:
          type: object
          properties: {}
          description: URI to human readable documentation of the error
    ViewTransactionDetailsDocumentResponse:
      required:
      - binaryData
      type: object
      properties:
        binaryData:
          type: string
          description: This field contains binary data of the Transaction detials.
          example: "0101010001101000011010010111001100100000011001100110100101100101011011000110010000100000011000110110"
        nextStartIndex:
          type: string
          description: In some cases there is more data than what can be returned
            in a single response. If there is additional data available a nextStartIndex
            will be returned. Pass the nextStartIndex in your next request to retrieve
            the next set of data.
          example: "11"
    TransactionDocumentList:
      type: object
      properties:
        transactionDocument:
          type: string
          description: "This is the pdf document displayed/generated against a transaction.\
            \ This is a reference data field. Please use /v1/utilities/referenceData/{transactionDocument}\
            \ resource to get valid value of this field with description."
          example: PAYMENT_ORDER
    AdditionalInformations:
      type: object
      properties:
        remarks1:
          type: string
          description: Remarks.
          example: Free text
        remarks2:
          type: string
          description: Remarks.
          example: Free text
        remarks3:
          type: string
          description: Remarks.
          example: Free text
        remarks4:
          type: string
          description: Remarks.
          example: Free text
        remarks5:
          type: string
          description: Remarks.
          example: Free text
    TransactionDetailsResponse:
      type: object
      properties:
        transactions:
          type: array
          description: Transactions list
          items:
            $ref: "#/components/schemas/Transaction"
        investmentTransaction:
          type: array
          description: Investment Transactions list
          items:
            $ref: "#/components/schemas/InvestmentTransaction"
        nextStartIndex:
          type: string
          description: In some cases there is more data than what can be returned
            in a single response. If there is additional data available a nextStartIndex
            will be returned. Pass the nextStartIndex in your next request to retrieve
            the next set of data.
          example: "11"
    Transaction:
      type: object
      properties:
        displayAccountNumber:
          type: string
          description: A masked account number that can be displayed to the customer
          example: XXXXXX2391
        transactionDate:
          type: string
          description: "Transaction date in YYYY-MM-DD format value conforming to\
            \ ISO 8601. This needs to be formatted in front-end for country/locale\
            \ specific display purposes. This is the field used for default sorting,"
          format: date
          example: 2015-06-21
        transactionTime:
          type: string
          description: Transaction time in HH-MM format value conforming to ISO. This
            needs to be formatted in front-end for country/locale/ partner specific
            display purposes. This is the field used for default sorting.
          example: 10:30:00 PM
        statementDate:
          type: string
          description: Date on which the account statement has been generated in ISO
            8601 date format YYYY-MM-DD. Applicable only for credit cards.
          format: date
          example: 2017-07-21
        transactionDescription:
          type: string
          description: "Transaction description from the merchant, POS or bank. If\
            \ there are foreign currency transactions on checking /saving account(s)\
            \ then description includes exchange rate, city and country."
          example: INTEREST PAYMENT
        transactionReferenceId:
          type: string
          description: 'Reference Id to uniquely identify the transaction.This is
            applicable for successful transactions. '
          example: BIMI51807310002051
        transactionDetailViewFlag:
          type: boolean
          description: Flag to indicate if this transaction is eligible for more detailed/L3
            view.
          example: true
        checkSerialNumber:
          type: string
          description: The check serial number. Applicable for checking accounts only
          example: "89000125"
        transactionAmount:
          type: number
          description: Transaction amount in local currency.
          format: double
          example: 50.55
        accountCurrencyTransactionAmount:
          type: number
          description: This is transaction amount in source account currency.
          format: double
          example: 50.55
        sourceAccountCurrencyCode:
          type: string
          description: The currency code of the source account in ISO 4217 format
          example: SGD
        currencyCode:
          type: string
          description: This is the local currency code of transaction in ISO 4217
            format
          example: EUR
        foreignTransactionAmount:
          type: number
          description: The transaction amount in the foreign currency
          example: 50.55
        foreignCurrencyCode:
          type: string
          description: The foreign currency code of the transaction in ISO 4217 format
          example: USD
        foreignExchangeRate:
          type: number
          description: The exchange rate at the time the foreign transaction was done
          example: 1.55
        transactionType:
          type: string
          description: "The type of transaction. This is a reference data field. Please\
            \ use /v1/utilities/referenceData/{transactionType} resource to get possible\
            \ values of this field with descriptions."
          example: DEBIT
        transactionStatus:
          type: string
          description: "The status of the transaction.  Applicable for credit cards\
            \ only.. This is a reference data field. Please use /v1/utilities/referenceData/{transactionStatus}\
            \ resource to get possible values of this field with descriptions."
          example: BILLED
        runningBalance:
          type: number
          description: The amount available to transact immediately
          format: double
          example: 1485.8
        transactionPostingDate:
          type: string
          description: Transaction posting date in YYYY-MM-DD format value conforming
            to ISO 8601. This needs to be formatted in front-end for country/locale
            specific display purposes. This is the field used for default sorting
          format: date
          example: 2016-12-02
        transactionCode:
          type: string
          description: The transaction code
          example: "260"
        merchantName:
          type: string
          description: The merchant name with which this transaction was made with
          example: "Alcott EU, Via Alberto Lionello, Roma"
        eligibleForEqualPaymentPlan:
          type: string
          description: "The EPP allowed indicator.This is a reference data field.\
            \ Please use /v1/utilities/referenceData/{eligibleForEqualPaymentPlan}\
            \ resource to get possible value of This field with description."
          example: ELIGIBLE
        transactionAuthorizationCode:
          type: string
          description: Transaction authorization code is a unique to a sales credit
            card transaction to indicate that the sale has been authorized. This is
            applicable only for pending transactions.
          example: "987012"
        merchantCategoryCode:
          type: string
          description: Merchant Category Code is a classification code that is a four-digit
            number listed in ISO 18245
          example: "5137"
        transactionDocumentList:
          type: array
          description: TransactionDocumentList
          items:
            $ref: "#/components/schemas/TransactionDocumentList"
        additionalInformations:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalInformations"
    InvestmentTransaction:
      type: object
      properties:
        orderDate:
          type: string
          description: Order date in YYYY-MM-DD format value conforming to ISO 8601.
            This needs to be formatted in front-end for country/locale specific display
            purposes. This is the field used for default sorting
          format: date
          example: 2016-09-05
        orderReferenceId:
          type: string
          description: Reference Id to uniquely identify the investment transaction
          example: "100234568743532"
        orderType:
          type: string
          description: "This is a reference data field. Please use /v1/utilities/referenceData/{orderType}\
            \ resource to get possible value of this field with description. You can\
            \ use the field name as the referenceCode parameter to retrieve the values."
          example: BUY
        code:
          type: string
          description: "Order code to uniquely identify the transaction,"
          example: BCF0001BB
        name:
          type: string
          description: Unique name  for fund/stock
          example: BIMI51807310002051
        securityType:
          type: string

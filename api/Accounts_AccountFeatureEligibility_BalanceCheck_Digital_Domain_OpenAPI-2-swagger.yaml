openapi: 3.0.1
info:
  title: Accounts_AccountFeatureEligibility_BalanceCheck_Digital_Domain_OpenAPI
  description: This API is used to check whether sufficient fund is available to do
    a transaction.
  version: 1.0.0
  x-linked-api: ProductCombination_Digital_Domain
  x-deployment-reference: SAVE-D-ProdCombination-DGL-EA

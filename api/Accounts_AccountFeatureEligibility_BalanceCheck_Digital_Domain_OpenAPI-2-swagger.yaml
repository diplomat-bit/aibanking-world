        style: simple
        explode: false
        schema:
          type: string
      - name: sufficiencyCheckAmount
        in: query
        description: Specifies amount to check account for sufficiency.
        required: true
        style: form
        explode: true
        schema:
          type: number
          format: double
      - name: currencyCode
        in: query
        description: Currency Code in ISO 4217 format
        required: true
        style: form
        explode: true
        schema:
          type: string
      responses:

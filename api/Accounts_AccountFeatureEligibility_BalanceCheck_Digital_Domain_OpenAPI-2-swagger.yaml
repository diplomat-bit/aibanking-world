security:
- Client_id: []
- Client_id_Query: []
paths:
  /:
    get:
      tags:
      - Accounts_Account Eligibility and Enrollment_Account Feature Eligibility
      summary: This API is used to know if there is specific amount of funds is available
        in the account
      description: This API is used to know if there is specific amount of funds is
        available in the account
      operationId: SufficiencyOfFunds
      parameters:

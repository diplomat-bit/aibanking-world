components:
  schemas:
    PartnerTransactionDetailsResponse:
      type: object
      properties:
        transactions:
          type: array
          description: Transactions list
          items:
            $ref: "#/components/schemas/Transaction"
        investmentTransaction:
          type: array
          description: Investment Transactions list
          items:
            $ref: "#/components/schemas/InvestmentTransaction"
        nextStartIndex:
          type: string
          description: In some cases there is more data than what can be returned
            in a single response. If there is additional data available a nextStartIndex
            will be returned. Pass the nextStartIndex in your next request to retrieve
            the next set of data.
          example: "11"
    Transaction:
      type: object
      properties:
        displayAccountNumber:
          type: string
          description: A masked account number that can be displayed to the customer
          example: XXXXXX2391
        transactionDate:
          type: string
          description: "Transaction date in YYYY-MM-DD format value conforming to\
            \ ISO 8601. This needs to be formatted in front-end for country/locale\
            \ specific display purposes. This is the field used for default sorting,"
          format: date
          example: 2015-06-21
        transactionTime:
          type: string
          description: Transaction time in HH-MM format value conforming to ISO. This
            needs to be formatted in front-end for country/locale/ partner specific
            display purposes. This is the field used for default sorting.
          example: 10:30:00 PM
        statementDate:
          type: string
          description: Date on which the account statement has been generated in ISO
            8601 date format YYYY-MM-DD. Applicable only for credit cards.
          format: date
          example: 2017-07-21
        transactionDescription:
          type: string
          description: "Transaction description from the merchant, POS or bank. If\
            \ there are foreign currency transactions on checking /saving account(s)\
            \ then description includes exchange rate, city and country."
          example: INTEREST PAYMENT
        transactionReferenceId:
          type: string
          description: 'Reference Id to uniquely identify the transaction.This is
            applicable for successful transactions. '
          example: BIMI51807310002051
        transactionDetailViewFlag:
          type: boolean
          description: Flag to indicate if this transaction is eligible for more detailed/L3
            view.
          example: true
        checkSerialNumber:
          type: string
          description: The check serial number. Applicable for checking accounts only
          example: "89000125"
        transactionAmount:
          type: number
          description: Transaction amount in local currency.
          format: double
          example: 50.55
        accountCurrencyTransactionAmount:
          type: number
          description: This is transaction amount in source account currency.
          format: double
          example: 50.55
        sourceAccountCurrencyCode:
          type: string
          description: The currency code of the source account in ISO 4217 format
          example: SGD
        currencyCode:
          type: string
          description: This is the local currency code of transaction in ISO 4217
            format
          example: EUR
        foreignTransactionAmount:
          type: number
          description: The transaction amount in the foreign currency
          example: 50.55
        foreignCurrencyCode:
          type: string
          description: The foreign currency code of the transaction in ISO 4217 format
          example: USD
        foreignExchangeRate:
          type: number
          description: The exchange rate at the time the foreign transaction was done
          example: 1.55
        transactionType:
          type: string
          description: "The type of transaction. This is a reference data field. Please\
            \ use /v1/utilities/referenceData/{transactionType} resource to get possible\
            \ values of this field with descriptions."
          example: DEBIT
        transactionStatus:
          type: string
          description: "The status of the transaction.  Applicable for credit cards\
            \ only.. This is a reference data field. Please use /v1/utilities/referenceData/{transactionStatus}\
            \ resource to get possible values of this field with descriptions."
          example: BILLED
        runningBalance:
          type: number
          description: The amount available to transact immediately
          format: double
          example: 1485.8
        transactionPostingDate:
          type: string
          description: Transaction posting date in YYYY-MM-DD format value conforming
            to ISO 8601. This needs to be formatted in front-end for country/locale
            specific display purposes. This is the field used for default sorting
          format: date
          example: 2016-12-02
        transactionCode:
          type: string
          description: The transaction code
          example: "260"
        merchantName:
          type: string
          description: The merchant name with which this transaction was made with
          example: "Alcott EU, Via Alberto Lionello, Roma"
        eligibleForEqualPaymentPlan:
          type: string
          description: "The EPP allowed indicator.This is a reference data field.\
            \ Please use /v1/utilities/referenceData/{eligibleForEqualPaymentPlan}\
            \ resource to get possible value of This field with description."
          example: ELIGIBLE
        transactionAuthorizationCode:
          type: string
          description: Transaction authorization code is a unique to a sales credit
            card transaction to indicate that the sale has been authorized. This is
            applicable only for pending transactions.
          example: "987012"
        merchantCategoryCode:
          type: string
          description: Merchant Category Code is a classification code that is a four-digit
            number listed in ISO 18245
          example: "5137"
        internationalTransactionReferenceNo:
          type: string
          description: This field is a unique reference number to identify International
            transaction.
          example: "9988"
        pdfIconDisplayRequiredFlag:
          type: boolean
          description: Flag for display of PDF icon
          example: true
        transactionDocumentList:
          type: array
          description: TransactionDocumentList
          items:
            $ref: "#/components/schemas/TransactionDocumentList"
        additionalInformations:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalInformations"
        reversalRequestId:
          type: string
          description: This field is to identify whether customer has already initiated
            reversal/cancellation.
          example: CANCBYUS
        transactionAcquirerReferenceNumber:
          type: string
          description: It is the AcquirerReferenceNumber received from acquiring system
          example: AB436232
        transactionUuid:
          type: string
          description: It is the unique transaction uuid
          example: hfyero3o4u3if
    AdditionalInformations:
      type: object
      properties:
        remarks1:
          type: string
          description: Remarks.
          example: Free text
        remarks2:
          type: string
          description: Remarks.
          example: Free text
        remarks3:
          type: string
          description: Remarks.
          example: Free text
        remarks4:
          type: string
          description: Remarks.
          example: Free text
        remarks5:
          type: string
          description: Remarks.
          example: Free text
    InvestmentTransaction:
      type: object
      properties:
        orderDate:
          type: string
          description: Order date in YYYY-MM-DD format value conforming to ISO 8601.
            This needs to be formatted in front-end for country/locale specific display
            purposes. This is the field used for default sorting
          format: date
          example: 2016-09-05
        orderReferenceId:
          type: string
          description: Reference Id to uniquely identify the investment transaction
          example: "100234568743532"
        orderType:
          type: string
          description: "This is a reference data field. Please use /v1/utilities/referenceData/{orderType}\
            \ resource to get possible value of this field with description. You can\
            \ use the field name as the referenceCode parameter to retrieve the values."
          example: BUY
        code:
          type: string
          description: "Order code to uniquely identify the transaction,"
          example: BCF0001BB
        name:
          type: string
          description: Unique name  for fund/stock
          example: BIMI51807310002051
        securityType:
          type: string
          description: "Type of the security.This is a reference data field. Please\
            \ use /v1/apac/utilities/referenceData/{securityType} resource to get\
            \ valid value of this field with description."
          example: BONDS
        currencyCode:
          type: string
          description: "The currency code of the transaction in ISO 4217 format,"
          example: EUR
        transactionAmount:
          type: number
          description: Transaction amount in local currency.
          format: double
          example: 12500.12
        price:
          type: number
          description: Order price of  trade
          format: double
          example: 21.32
        orderStatus:
          type: string
          description: "This is a reference data field. Please use /v1/utilities/referenceData/{orderStatus}\
            \ resource to get possible value of This field with description."
          example: SETTLED
        grossAmount:
          type: number
          description: The total amount of the transaction
          format: double
          example: 5000.25
        orderQuantity:
          type: number
          description: Total number of units ordered
          format: double
          example: 1100.0
        orderMedium:
          type: string
          description: "The medium used by customer to place order.This is a reference\
            \ data field. Please use /v1/utilities/referenceData/{orderMedium} resource\
            \ to get possible values of This field with descriptions."
          example: INTERNET
        filledQuantity:
          type: number
          description: Number of units received
          format: double
          example: 1100.0
        balanceQuantity:
          type: number
          description: Number of units not received
          format: double
          example: 1255.0
        stockMarketCode:
          type: string
          description: Trading market code for securities
          example: NYSE
        limitPrice:
          type: number
          description: minimum price for securities bond
          format: double
          example: 27.12
        weightedTradePrice:
          type: number
          description: mean price of the securities bond
          format: double
          example: 27.12
        isinCode:
          type: string
          description: ISIN stands for International Securities Identification Number.
            These numbers are unique codes used to identify and track securities worldwide
          example: US5949181045
        referenceCurrencyCode:
          type: string
          description: The currency used for reference in bonds
          example: EUR
        investmentAmountInLocalCurrency:
          type: number
          description: InvestmentAmount In local currency
          format: double
          example: 5000.25
        settlementAmountInSecurityCurrency:
          type: number
          description: The settlement amount for securities
          format: double
          example: 5000.25
        settlementAmountInReferenceCurrency:
          type: number
          description: The settlement amount for securities for referency currency
          format: double
          example: 5000.25
        investmentAmountInSecurityCurrency:
          type: number
          description: The investment amount for securities
          format: double
          example: 5000.25
        settlementDate:
          type: string
          description: Date Of Settlement for Securities Bond
          format: date
          example: 2021-12-01
        tradePrice:
          type: number
          description: price of  the trade prior to the current date
          format: double
          example: 20.32
        marketAndLossOrderTypeFlag:
          type: boolean
          description: It is a flag that states this order is what kind of order market
            order or loss order
          example: true
        stopLossIndicator:
          type: string
          description: It indicates whether order is a stop loss order or not
          example: "Y"
        tradeDateTime:
          type: string
          description: The trade date time of order in ISO 8601 date time format YYYY-MM-DDThh:mm:ss.sTZD
          format: dateTime
          example: 2020-07-14-18.17.10.010402
    TransactionDocumentList:
      type: object
      properties:
        transactionDocument:
          type: string
          description: "This is the pdf document displayed/generated against a transaction.\
            \ This is a reference data field. Please use /v1/utilities/referenceData/{transactionDocument}\
            \ resource to get valid value of this field with description."
          example: PAYMENT_ORDER
    PartnerTransactionDetailsWithLimitedDayRangeResponse:
      type: object
      properties:
        transactions:
          type: array
          description: Transactions list
          items:
            $ref: "#/components/schemas/LimitedDayTransaction"
        investmentTransactions:
          type: array
          description: Investment Transactions list
          items:
            $ref: "#/components/schemas/LimitedDayInvestmentTransaction"
        nextStartIndex:
          type: string
          description: In some cases there is more data than what can be returned
            in a single response. If there is additional data available a nextStartIndex
            will be returned. Pass the nextStartIndex in your next request to retrieve
            the next set of data.
          example: "11"
    LimitedDayTransaction:
      type: object
      properties:
        displayAccountNumber:
          type: string
          description: A masked account number that can be displayed to the customer
          example: XXXXXX2391
        transactionDate:
          type: string
          description: "Transaction date in YYYY-MM-DD format value conforming to\
            \ ISO 8601. This needs to be formatted in front-end for country/locale\
            \ specific display purposes. This is the field used for default sorting,"
          format: date
          example: 2015-06-21
        statementDate:
          type: string
          description: Date on which the account statement has been generated in ISO
            8601 date format YYYY-MM-DD. Applicable only for credit cards.
          format: date
          example: 2017-07-21
        transactionDescription:
          type: string
          description: "Transaction description from the merchant, POS or bank. If\
            \ there are foreign currency transactions on checking /saving account(s)\
            \ then description includes exchange rate, city and country."
          example: INTEREST PAYMENT
        transactionReferenceId:
          type: string
          description: 'Reference Id to uniquely identify the transaction.This is
            applicable for successful transactions. '
          example: BIMI51807310002051
        transactionDetailViewFlag:
          type: boolean
          description: Flag to indicate if this transaction is eligible for more detailed/L3
            view.
          example: true
        checkSerialNumber:
          type: string
          description: The check serial number. Applicable for checking accounts only
          example: "89000125"
        transactionAmount:
          type: number
          description: Transaction amount in local currency.
          format: double
          example: 50.55
        accountCurrencyTransactionAmount:
          type: number
          description: This is transaction amount in source account currency.
          format: double
          example: 50.55
        sourceAccountCurrencyCode:
          type: string
          description: The currency code of the source account in ISO 4217 format
          example: SGD
        currencyCode:
          type: string
          description: This is the local currency code of transaction in ISO 4217
            format
          example: EUR
        foreignTransactionAmount:
          type: number
          description: The transaction amount in the foreign currency
          example: 50.55
        foreignCurrencyCode:
          type: string
          description: The foreign currency code of the transaction in ISO 4217 format
          example: USD
        foreignExchangeRate:
          type: number
          description: The exchange rate at the time the foreign transaction was done
          format: double
          example: 1.55
        transactionType:
          type: string
          description: "The type of transaction. This is a reference data field. Please\
            \ use /v1/utilities/referenceData/{transactionType} resource to get possible\
            \ values of this field with descriptions."
          example: DEBIT
        transactionStatus:
          type: string
          description: "The status of the transaction.  Applicable for credit cards\
            \ only.. This is a reference data field. Please use /v1/utilities/referenceData/{transactionStatus}\
            \ resource to get possible values of this field with descriptions."
          example: BILLED
        runningBalance:
          type: number
          description: The amount available to transact immediately
          format: double
          example: 1485.8
        transactionPostingDate:
          type: string
          description: Transaction posting date in YYYY-MM-DD format value conforming
            to ISO 8601. This needs to be formatted in front-end for country/locale
            specific display purposes. This is the field used for default sorting
          format: date
          example: 2016-12-02
        transactionCode:
          type: string
          description: The transaction code
          example: "260"
        merchantName:
          type: string
          description: The merchant name with which this transaction was made with
          example: "Alcott EU, Via Alberto Lionello, Roma"
        eligibleForEqualPaymentPlan:
          type: string
          description: "The EPP allowed indicator. This is applicable for credit cards\
            \ transactions only. This is a reference data field. Please use /v1/utilities/referenceData/{eligibleForEqualPaymentPlan}\
            \ resource to get possible value of This field with description."
          example: ELIGIBLE
        transactionAuthorizationCode:
          type: string
          description: Transaction authorization code is a unique to a sales credit
            card transaction to indicate that the sale has been authorized. This is
            applicable only for pending transactions.
          example: "987012"
        transactionDocumentList:
          type: array
          description: TransactionDocumentList
          items:
            $ref: "#/components/schemas/TransactionDocumentList"
    LimitedDayInvestmentTransaction:
      type: object
      properties:
        orderDate:
          type: string
          description: Order date in YYYY-MM-DD format value conforming to ISO 8601.

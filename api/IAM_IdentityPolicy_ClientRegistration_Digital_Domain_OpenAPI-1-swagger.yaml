        description: countryCode
        required: true
        style: simple
        explode: false
        schema:
          type: string
      - name: businessCode
        in: path
        description: businessCode
        required: true
        style: simple
        explode: false
        schema:
          type: string
      requestBody:
        description: DynamicClientRegistrationRequest

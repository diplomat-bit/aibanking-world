openapi: 3.0.1
info:
  title: IAM_IdentityPolicy_ClientRegistration_Digital_Domain_OpenAPI
  description: The API allows the TPP to request the ASPSP to perform the management
    of client registration.
  version: 1.0.0
  x-deployment-reference: AUTH-D-PartyAuth-DGL-EA
  x-linked-api: PartyAuthentication_Digital_Domain
servers:
- url: https://127.0.0.1/openapi/v1/auth/clients/register

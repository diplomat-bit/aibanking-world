openapi: 3.0.1
info:
  title: MoneyMovementAdhocMultipleTransfers_OpenAPI
  description: This API contains endpoints related to adhoc multiple transfers.
  version: 1.4.0
  x-deployment-reference: ""
  x-linked-api: "ExecutePaymentInitiationTransactionAdhocMultipleTransferAsync, ExecutePaymentInitiationTransactionAdhocMultipleTransferConfirmationAsync"
servers:
- url: https://127.0.0.1/openapi/v1/paymentInitiation/adhoc/multipleTransfers
paths:
  /async:
    post:
      tags:
      - Money Movement_Transfers
      summary: Submit Multiple Transfers for Adhoc Payees
      description: "This API is used for Citi Business customers to process multiple\
        \ payment requests for Adhoc payees. In case authorization is required, this\
        \ API will throw mfa Requried error. Prerequisite: Retrieve the applicable\
        \ payment types, eligible source accounts from RetrievePaymentInitiationTransactionBulkSourceAccountAndPayeeEligibility\
        \ API."
      operationId: ExecutePaymentInitiationTransactionAdhocMultipleTransferAsync
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Content-Type"
      - name: x-jws-signature
        in: header
        description: "This field is signature generated when partner sign API payload.This\
          \ signature will be used to validate that the call is coming from a valid\
          \ partner. This signature is a JWT token, which will be validated with partner’\
          s JWK stored in DB"
        required: false
        style: simple
        explode: false
        schema:
          type: string
      - $ref: "#/components/parameters/clientDetails"
      - name: nextStartIndex
        in: query
        description: In some cases there is more data than what can be returned in
          a single response. If there is additional data available a nextStartIndex
          will be returned. Pass the nextStartIndex in your next request to retrieve
          the next set of data.
        required: false
        style: form
        explode: true
        schema:
          type: string
      requestBody:
        description: ExecutePaymentInitiationTransactionAdhocMultipleTransferAsyncRequest
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutePaymentInitiationTransactionAdhocMultipleTransferAsyncRequest"
        required: true
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutePaymentInitiationTransactionAdhocMultipleTransferAsyncResponse"
        "201":
          description: Created
          content: {}
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>InvalidRequest</td><td>Missing
            or invalid Parameters</td></tr><tr><td>error</td><td>InvalidRequest</td><td>Invalid
            source account</td></tr><tr><td>error</td><td>InvalidRequest</td><td>Invalid
            payee id</td></tr><tr><td>error</td><td>transactionDenied</td><td>Transaction
            is denied</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credentials are missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>accessNotConfigured</td><td>The
            request operation is not configured to access this resource</td></tr><tr><td>error</td><td>mfaRequired</td><td>MFA
            is required</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>resourceNotFound</td><td>Resource
            not found</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>businessValidationsFailed</td><td>Business
            validations failed</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codegen-request-body-name: ExecutePaymentInitiationTransactionAdhocMultipleTransferAsyncRequest
  /confirmation/async:
    post:
      tags:
      - Money Movement_Transfers
      summary: Confirm Multiple Transfers for Adhoc Payees
      description: "This API is used for confirmation of multiple transfers to adhoc\
        \ payees In case authorization is required, customer will be redirected to\
        \ authorization page. Once authorization is confirmed as successful, this\
        \ API will be used to trigger confirmation of multiple payments."
      operationId: ExecutePaymentInitiationTransactionAdhocMultipleTransferConfirmationAsync
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Content-Type"
      - $ref: "#/components/parameters/clientDetails"
      - name: controlFllowId
        in: query
        description: This is control flow ID
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutePaymentInitiationTransactionAdhocMultipleTransferConfirmationAsyncResponse"
        "201":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>Created</td><td>Created</td><td>Created</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: <table><tr><td>error</td><td>InvalidRequest</td><td>Missing
            or invalid Parameters</td></tr><tr><td>error</td><td>InvalidRequest</td><td>Invalid
            source account</td></tr><tr><td>error</td><td>InvalidRequest</td><td>Invalid
            payee id</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credentials are missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>The
            request operation is not configured to access this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>resourceNotFound</td><td>Empty
            resource/resource not found</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>businessValidationsFailed</td><td>Business
            validations failed</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ExecutePaymentInitiationTransactionAdhocMultipleTransferAsyncRequest:
      required:
      - totalTransferAmount
      type: object
      properties:
        totalTransferAmount:
          type: number
          description: This is total transfer amount
          format: double
          example: 100
        transferType:
          type: string
          description: This is type of transfers
          example: INTERNAL
        internalDomesticDetails:
          type: array
          items:
            $ref: "#/components/schemas/InternalDomesticDetails"
        externalDomesticDetails:
          type: array
          items:
            $ref: "#/components/schemas/ExternalDomesticDetails"
        crossBorderDetails:
          type: array
          items:
            $ref: "#/components/schemas/CrossBorderDetails"
        sepa:
          type: array
          items:
            $ref: "#/components/schemas/Sepa"
    InternalDomesticDetails:
      required:
      - paymentScheduleType
      - sourceAccountId
      - transactionAmount
      - transferCurrencyIndicator
      type: object
      properties:
        sourceAccountId:
          type: string
          description: The source account identifier in encrypted format.
          example: 29a3eb92-5195-42fa-9817-ccf2617f4888
        transferCurrencyIndicator:
          type: string
          description: The indicator to determine if transfer is to be settled in
            source of benefciary currency
          example: SOURCE_ACCOUNT_CURRENCY
        transactionCurrencyCode:
          type: string
          description: The currency code accepted by the beneficiary
          example: USD
        transactionAmount:
          type: number
          description: The transaction amount
          format: double
          example: 10
        payeeMiniAccountDetails:
          $ref: "#/components/schemas/PayeeMiniAccountDetails"
        remarks:
          type: array
          items:
            $ref: "#/components/schemas/Remarks"
        futureDatedTransaction:
          $ref: "#/components/schemas/FutureDatedTransaction"
        standingInstruction:
          $ref: "#/components/schemas/StandingInstruction"
        paymentScheduleType:
          type: string
          description: "The payment schedule type. This is a reference data. Please\
            \ use /v1/apac/utilities/referenceData/{paymentScheduleType} resource\
            \ to get valid value of this field."
          example: "if Blank is coming for EMEA, throw invalid Request"
    PayeeMiniAccountDetails:
      required:
      - payeeAccountNumber
      type: object
      properties:
        payeeAccountNumber:
          type: string
          description: This is beneficiairyAccountNumber
          example: "558877744"
        payeeName:
          type: string
          description: This is payeeName
          example: MarkJacobs
        payeeNickName:
          type: string
          description: "This is beneficiaryNickName,applicable for UK"
          example: Mark
    Remarks:
      type: object
      properties:
        remarks:
          type: string
          description: Payment notes. Free text from screen
    FutureDatedTransaction:
      required:
      - scheduleDate
      type: object
      properties:
        scheduleDate:
          type: string
          description: Date on which the future transaction is scheduled in ISO 8601
            format YYYY-MM-DD.$$M
          format: date
    StandingInstruction:
      required:
      - standingInstructionEndDate
      type: object
      properties:
        standingInstructionStartDate:
          type: string
          description: Standing instruction start date in ISO 8601 format YYYY-MM-DD.
          format: date
          example: 2021-10-18
        paymentFrequency:
          type: string
          description: "The frequency of payment. This is a reference data. Please\
            \ use /v1/apac/utilities/referenceData/{paymentFrequency} resource to\
            \ get valid value of this field."
          example: Monthly
        perpetualFlag:
          type: boolean
          description: standingInstruction  This will be mandatory when Payment Schedule
            Type is Future Dated Recurring.$$O
        standingInstructionEndDate:
          type: string
          description: Standing instruction start date in ISO 8601 format YYYY-MM-DD.
          format: date
          example: 2021-10-18
        standingInstructionCount:
          type: number
          description: This is no of payments instructed  to be made by customer from
            start Date
          format: integer
          example: 8
    ExternalDomesticDetails:
      required:
      - chargeBearer
      - paymentMethod
      - paymentScheduleType
      - sourceAccountId
      - transactionAmount
      type: object
      properties:
        sourceAccountId:
          type: string
          description: The source account identifier in encrypted format.
          example: 29a3eb92-5195-42fa-9817-ccf2617f4888
        transferCurrencyIndicator:
          type: string
          description: The indicator to determine if transfer is to be settled in
            source of benefciary currency
          example: SOURCE_ACCOUNT_CURRENCY
        transactionCurrencyCode:
          type: string
          description: The currency code accepted by the beneficiary
          example: USD
        chargeBearer:
          type: string
          description: "Field to identify charge bearer.The acceptable forms of remittance\
            \ for a given payments and transfer transaction.This is a reference data\
            \ field. Please use /v1/utilities/referenceData/{chargeBearer} resource\
            \ to get valid value of this field with description."
          example: BENEFICIARY
        paymentMethod:
          type: string
          description: "The acceptable forms of remittance for a given payments and\
            \ transfer transaction.This is a reference data field. Please use /v1/utilities/referenceData/{paymentMethod}\
            \ resource to get valid value of this field with description."
          example: GIRO
        transactionAmount:
          type: number
          description: The transaction amount
          format: double
          example: 4500.25
        paymentType:
          type: string
          description: "The payment type.This is a reference data field. Please use\
            \ /v1/utilities/referenceData/{paymentType} resource to get valid value\
            \ of this field with description."
          example: EXTERNAL
        foreignExchangeReferenceNumber:
          type: string
          description: Fx deal reference number
          example: "12345678"
        paymentScheduleType:
          type: string
          description: "The payment schedule type. This is a reference data. Please\
            \ use /v1/utilities/referenceData/{paymentScheduleType} resource to get\
            \ valid value of this field."
          example: IMMEDIATE
        futureDatedTransaction:
          $ref: "#/components/schemas/FutureDatedTransaction"
        standingInstruction:
          $ref: "#/components/schemas/StandingInstruction"
        payeeAccountDetails:
          $ref: "#/components/schemas/PayeeAccountDetails"
        remarks:
          type: array
          items:
            $ref: "#/components/schemas/Remarks"
        transferPurpose:
          type: string
          description: "Purpose of transfer. Applicable if paymentMethod is GIRO,\
            \ FAST. This is a reference data field.This is a reference data field.\
            \ Please use /v1/utilities/referenceData/{transferPurpose} resource to\
            \ get valid value of this field with description."
          example: CASH_DISBURSEMENT
    PayeeAccountDetails:
      required:
      - payeeAccountNumber
      - payeeCurrencyCode
      type: object
      properties:
        payeeAccountNumber:
          type: string
          description: This is beneficiairyAccountNumber
          example: "558877744"
        payeeName:
          type: string
          description: This is payeeName
          example: MarkJacobs
        payeeNickName:
          type: string
          description: "This is beneficiaryNickName,applicable for UK"
          example: Mark
        payeeAddress:
          $ref: "#/components/schemas/PayeeAddress"
        bankDetails:
          $ref: "#/components/schemas/BankDetails"
        payeeCurrencyCode:
          type: string
          description: The currency code of the destination account in ISO 4217 format
          example: SGD
    PayeeAddress:
      required:
      - addressLine1
      type: object
      properties:
        addressLine1:
          type: string
          description: This is payees address line 1
          example: 40A Orchard Road
        addressLine2:
          type: string
          description: This is payees address line 2
          example: "null"
        addressLine3:
          type: string
          description: This is payees address line 3
          example: POLAND-510121
    BankDetails:
      required:
      - bankCode
      type: object
      properties:
        bankCode:
          type: string
          description: Bank Code of the payee.
          example: "671900000017"
        payeeBankName:
          type: string
          description: Name of the bank
          example: HSBC Bank
        payeeBankAddress:
          $ref: "#/components/schemas/PayeeBankAddress"
    PayeeBankAddress:
      required:
      - addressLine1
      type: object
      properties:
        addressLine1:
          type: string
          description: Address line 1
          example: 40A Orchard Road
        addressLine2:
          type: string
          description: Address line 2
          example: "null"
        addressLine3:
          type: string
          description: Address line 3
          example: POLAND-510121
        countryName:
          type: string
          description: "This field is to indicate the name of the country. This is\
            \ a reference data field. Please use \\/v1\\/utilities\\/referenceData\\\
            /{countryName} resource to get valid value of this field with description."
          example: POLAND
    CrossBorderDetails:
      required:
      - chargeBearer
      - paymentScheduleType
      - sourceAccountId
      - transactionAmount
      type: object
      properties:
        sourceAccountId:
          type: string
          description: "The source account identifier in encrypted format.Typically,\
            \ this is not displayed to the customer."
          example: 29a3eb92-5195-42fa-9817-ccf2617f4888
        transferCurrencyIndicator:
          type: string
          description: The indicator to determine if transfer is to be settled in
            source of benefciary currency
          example: SOURCE_ACCOUNT_CURRENCY
        transactionCurrencyCode:
          type: string
          description: The currency code accepted by the beneficiary
          example: USD
        chargeBearer:
          type: string
          description: "Specifies which party(ies) will pay charges due for processing\
            \ of the instruction. Please use /v1/utilities/referenceData/{chargeBearer}\
            \ resource to get valid value of this field with description."
          example: BENEFICIARY
        transactionAmount:
          type: number
          description: The transaction amount
          format: double
          example: 4500.25
        paymentType:
          type: string
          description: "The payment type.This is a reference data field. Please use\
            \ /v1/utilities/referenceData/{paymentType} resource to get valid value\
            \ of this field with description."
          example: EXTERNAL
        foreignExchangeReferenceNumber:
          type: string
          description: Fx deal reference number
          example: "12345678"
        paymentScheduleType:
          type: string
          description: "The payment schedule type. This is a reference data. Please\
            \ use /v1/utilities/referenceData/{paymentScheduleType} resource to get\
            \ valid value of this field."
          example: IMMEDIATE
        payeeAccountDetail:
          $ref: "#/components/schemas/PayeeAccountDetail"
        futureDatedTransaction:
          $ref: "#/components/schemas/FutureDatedTransaction"
        standingInstruction:
          $ref: "#/components/schemas/StandingInstruction"
        remarks:
          type: array
          items:
            $ref: "#/components/schemas/Remarks"
    PayeeAccountDetail:
      required:
      - payeeAccountNumber
      - payeeCurrencyCode
      type: object
      properties:
        payeeAccountNumber:
          type: string
          description: This is beneficiairyAccountNumber
          example: "558877744"
        accountIbanFlag:
          type: boolean
          description: This field is to indicate whether the account number is IBAN
            or not
          example: true
        payeeName:
          type: string
          description: This is payeeName
          example: MarkJacobs
        payeeNickName:
          type: string
          description: "This is beneficiaryNickName,applicable for UK"
          example: Mark
        payeeCurrencyCode:
          type: string
          description: The currency code of the destination account in ISO 4217 format
          example: SGD
        payeeAddress:
          $ref: "#/components/schemas/PayeeAddress"
        payeeBankDetails:
          $ref: "#/components/schemas/PayeeBankDetails"
    PayeeBankDetails:
      required:
      - swiftCode
      type: object
      properties:
        swiftCode:
          type: string
          description: This field is to indicate the SWIFT code(Society for Worldwide
            Interbank Financial Telecommunication code). An internationally-recognized
            identification code for banks around the world.
          example: HKBAAU2SBNE
        payeeBankAddress:
          $ref: "#/components/schemas/PayeeBankAddress"
        payeeBankName:
          type: string
          description: Name of the bank
          example: HSBC Bank
    Sepa:
      required:
      - sourceAccountId
      - transactionCurrencyCode
      type: object
      properties:
        sourceAccountId:
          type: string
          description: "The source account identifier in encrypted format.Typically,\
            \ this is not displayed to the customer."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        transactionCurrencyCode:
          type: string
          description: "This is an indicator if transfer is to be done in source or\
            \ destination currency, this is CVT field transferCurrencyIndicator"
          example: PLN
        transactionAmount:
          type: number
          description: Transaction Amount
          format: double
          example: 4500.21
        payeeAccountInfo:
          $ref: "#/components/schemas/PayeeAccountInfo"
        remarks:
          type: array
          items:
            $ref: "#/components/schemas/Remarks"
    PayeeAccountInfo:
      required:
      - payeeAccountNumber
      - payeeName
      type: object
      properties:
        payeeAccountNumber:
          type: string
          description: The account number of the destination account
          example: "251212582364"
        payeeName:
          type: string
          description: Name of the payee
          example: MARC
        payeeNickName:
          type: string
          description: The nick name of the payee assigned by the customer.
          example: MarcJ
        payeeAddress:
          $ref: "#/components/schemas/PayeeAddress"
        payeeBankMiniDetail:
          $ref: "#/components/schemas/PayeeBankMiniDetail"
    PayeeBankMiniDetail:
      required:
      - swiftCode
      type: object
      properties:
        swiftCode:
          type: string
          description: This field is to indicate the SWIFT code(Society for Worldwide
            Interbank Financial Telecommunication code). An internationally-recognized
            identification code for banks around the world.
          example: HKBAAU2SBNE
        countryName:
          type: string
          description: "This field is to indicate the name of the country. This is\
            \ a reference data field. Please use /v1/utilities/referenceData/{countryName}\
            \ resource to get valid value of this field with description."
          example: SINGAPORE
        payeeBankName:
          type: string
          description: Name of the bank
          example: HSBC Bank
    ExecutePaymentInitiationTransactionAdhocMultipleTransferAsyncResponse:
      type: object
      properties:
        transactionStatus:
          type: string
          description: This is transaction status
        citiBundleId:
          type: string
          description: This is bundle/ bulk id of the transactions from Citi
        totalTransactionCount:
          type: string
          description: This is total number of transactions
        controlFlowId:
          type: string
          description: This is control flow id
    ExecutePaymentInitiationTransactionAdhocMultipleTransferConfirmationAsyncResponse:
      type: object
      properties:
        transactionStatus:
          type: string
          description: This is transaction status
        bundleId:
          type: string
          description: This is bundle/ bulk id of the transactions from TPP
        citiBundleId:
          type: string
          description: This is bundle/ bulk id of the transactions from CITI
        totalTransactionCount:
          type: string
          description: This is total number of transactions
    ErrorResponse:
      required:
      - code
      - type
      type: object
      properties:
        type:
          type: string
          description: Invalid - Request did not confirm to the specification and
            was unprocessed and rejected. Please fix the value and try again
          enum:
          - error
          - warn
          - invalid
          - fatal
        code:
          type: string
          description: Error code which qualifies the error
        details:
          type: string
          description: Human readable explanation specific to the occurrence of the
            problem
        location:
          type: string
          description: The name of the field that resulted in the error
        moreInfo:
          type: object
          properties: {}
          description: URI to human readable documentation of the error
  parameters:
    Authorization:
      name: Authorization
      in: header
      description: "The most recent Authorization token. This will have the format\
        \ Bearer + {space} + {accessToken}. Example: Bearer KGNsaWVudF9pZDpjbGllbnRfc2VjcmV0KQ==."
      required: true
      style: simple
      explode: false
      schema:
        type: string
    uuid:
      name: uuid
      in: header
      description: 128 bit random UUID generated uniquely for every request.
      required: true
      style: simple
      explode: false
      schema:
        type: string
    Accept:
      name: Accept
      in: header
      description: Content-Type that are acceptable for the response.
      required: true
      style: simple
      explode: false
      schema:
        type: string
    client_id:
      name: client_id
      in: header
      description: Client ID generated during application registration.
      required: true
      style: simple
      explode: false
      schema:
        type: string
    Content-Type:
      name: Content-Type
      in: header
      description: application/json
      required: true
      style: simple
      explode: false
      schema:
        type: string
    x-jws-signature:
      name: x-jws-signature
      in: header
      description: Required for partners connecting via 1-way SSL
      required: false
      style: simple
      explode: false
      schema:
        type: string
    clientDetails:
      name: clientDetails
      in: header
      description: "This field is used to capture device,browser and network information.\
        \ Refer the developer portal for more information.These are the fields which\
        \ will be passed as part of the header devicePrint,deviceTokenCookie,userIpAddress,userAgent,hardwareId,simId,deviceModel,deviceName,deviceOsName,deviceOsVersion,multitaskingSupportFlag,languageSupport,wifiMacAddress,cellTowerId,locationAreaCode,rsaApplicationKey,wapClientId,mobileCarrierCode,mobileCountryCode,osId,geoLongitude,geoLatitude,geoHorizontalAccuracy,geoAltitude,geoAltitudeAccuracy,geoSpeed,geoTimestamp,geoStatus,basicServiceSetId,signalStrength,wifiChannel,serviceSetId"
      required: false
      style: simple
      explode: false
      schema:
        type: string

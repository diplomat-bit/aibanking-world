openapi: 3.0.1
info:
  title: MoneyMovementCrossBorderWireTransfer_OpenAPI
  description: This API is used to perform the operations for associated with cross
    border wire transfer.
  version: 1.3.0
  x-deployment-reference: "PYMT-D-PaymentInit-INTL-DGL-EA,PYMT-D-PaymentOrder-EXEC-INTL-DGL-EA"
  x-linked-api: "PaymentInitiation_InternationalTransfers_Digital_Domain,PaymentOrder_Execution_InternationalTransfers_Digital_Domain"
servers:
- url: https://127.0.0.1/openapi/v1/moneyMovement/crossBorderWireTransfers
paths:
  /payees/sourceAccounts:
    get:
      tags:
      - Money Movement_Transfers_Wire Transfer
      summary: Retrieve Destination Source Account Cross Border Transfer
      description: "This API returns the valid combinations of cross border transfer\
        \ destination and source accounts. This information may be used to prepare\
        \ a valid source list for a selected destination, or vice versa."
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/clientDetails"
      - name: paymentType
        in: query
        description: "Type of the payment. This is a reference data field. Please\
          \ use /v1/utilities/referenceData/{paymentType} resource to get valid values\
          \ of this field with descriptions."
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: nextStartIndex
        in: query
        description: In some cases there is more data than what can be returned in
          a single response. If there is additional data available a nextStartIndex
          will be returned. Pass the nextStartIndex in your next request to retrieve
          the next set of data.
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossBorderWireTransfersAccountPayeeEligibilityResponse"
        "204":
          description: No Content
          content: {}
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /preprocess:
    post:
      tags:
      - Money Movement_Transfers_Wire Transfer
      summary: Create Cross Border Transfer
      description: This API allows you to pre process the Cross Border Wire Transfers.
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Content-Type"
      - $ref: "#/components/parameters/clientDetails"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrossBorderWireTransfersPreprocessRequest"
        required: true
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossBorderWireTransfersPreprocessResponse"
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr><tr><td>error</td><td>invalidPayee</td><td>Payee
            is invalid</td></tr><tr><td>error</td><td>invalidSourceAccount</td><td>Source
            account is invalid</td></tr><tr><td>error</td><td>invalidAccountCombination</td><td>Invalid
            source and destination account combination</td></tr><tr><td>error</td><td>invalidTransactionAmount</td><td>Transaction
            amount is invalid</td></tr><tr><td>error</td><td>transactionAmountBelowMinimum</td><td>Transaction
            amount below minimum amount</td></tr><tr><td>error</td><td>transactionAmountExceedsMaximum</td><td>Allowed
            transaction amount limit for this transaction exceeded</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codegen-request-body-name: CrossBorderWireTransfersPreprocessRequest
  /preprocess/adhoc:
    post:
      tags:
      - Money Movement_Transfers_Wire Transfer
      summary: Create Adhoc Cross Border Transfer
      description: This API is used to create a new cross border transfer to an adhoc
        destination and verifies there are no errors. The destination does not need
        to be in a payee list. The response from this resource should be used to construct
        a pre-confirmation page so the customer can review the transaction before
        confirming.
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Content-Type"
      - $ref: "#/components/parameters/clientDetails"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdhocCrossBorderWireTransfersPreprocessRequest"
        required: true
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdhocCrossBorderWireTransfersPreprocessResponse"
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr><tr><td>error</td><td>invalidAccount</td><td>Account
            is invalid</td></tr><tr><td>error</td><td>invalidTransactionAmount</td><td>Transaction
            amount is invalid</td></tr><tr><td>error</td><td>transactionAmountExceedsMaximum</td><td>Allowed
            transaction amount limit for this transaction exceeded</td></tr><tr><td>error</td><td>transactionAmountBelowMinimum</td><td>Transaction
            amount below minimum amount</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codegen-request-body-name: AdhocCrossBorderWireTransfersPreprocessRequest
  /:
    post:
      tags:
      - Money Movement_Transfers_Wire Transfer
      summary: Confirm Cross Border Transfer
      description: "This API is used to confirms the cross border transfer. It should\
        \ be called after successfully creating the cross border transfer. If successful,\
        \ it will return a confirmation number that should be displayed and stored."
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Content-Type"
      - $ref: "#/components/parameters/clientDetails"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrossBorderWireTransfersRequest"
        required: true
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossBorderWireTransfersResponse"
        "202":
          description: "Accepted –The request has been accepted for processing , but\
            \ has not been completed."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossBorderWireTransfersResponse"
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr><tr><td>error</td><td>invalidControlFlowId</td><td>Control
            flow ID is invalid</td></tr><tr><td>error</td><td>preprocessFxRateExpired</td><td>Pre-process
            forex rate is expired</td></tr><tr><tr><td>error</td><td>transactionAmountBelowLimit</td><td>Transaction
            amount below minimum amount</td></tr><tr><td>error</td><td>transactionAmountLimitExceeded</td><td>Allowed
            transaction amount limit for this transaction exceeded</td></tr><tr><td>error</td><td>invalidTransactionAmount</td><td>Transaction
            amount is invalid</td></tr><tr><td>error</td><td>insufficientFund</td><td>Insufficient
            fund</td></tr><tr><td>error</td><td>dailyTransactionAmountLimitReached</td><td>Maximum
            daily transaction amount limit reached</td></tr><tr><td>error</td><td>invalidDateRange</td><td>Date
            range is invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr><tr><td>error</td><td>mfaRequired</td><td>MFA
            is required</td></tr><tr><td>error</td><td>transactionDenied</td><td>Transaction
            Denied</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codegen-request-body-name: CrossBorderWireTransfersRequest
components:
  schemas:
    CrossBorderWireTransfersAccountPayeeEligibilityResponse:
      required:
      - sourceAccounts
      type: object
      properties:
        sourceAccounts:
          type: array
          items:
            $ref: "#/components/schemas/SourceAccounts"
        payeeSourceAccountCombinations:
          type: array
          items:
            $ref: "#/components/schemas/PayeeSourceAccountCombinations"
        nextStartIndex:
          type: string
          description: In some cases there is more data than what can be returned
            in a single response. If there is additional data available a nextStartIndex
            will be returned. Pass the nextStartIndex in your next request to retrieve
            the next set of data.
          example: "11"
    CrossBorderWireTransfersPreprocessRequest:
      required:
      - chargeBearer
      - payeeId
      - sourceAccountId
      - transactionAmount
      type: object
      properties:
        sourceAccountId:
          type: string
          description: "The source account identifier in encrypted format.Typically,\
            \ this is not displayed to the customer."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        payeeId:
          type: string
          description: "The payee identifier in encrypted format.Typically, this is\
            \ not displayed to the customer."
          example: C$0003019202$AU$XX$01000540000001
        transactionAmount:
          type: number
          description: The transaction amount
          format: double
          example: 4500.25
        transactionCurrencyCode:
          type: string
          description: The currency code for the transaction amount in ISO 4217 format.
          example: PLN
        chargeBearer:
          type: string
          description: "Field to identify charge bearer.The acceptable forms of remittance\
            \ for a given payments and transfer transaction.This is a reference data\
            \ field. Please use /v1/utilities/referenceData/{chargeBearer} resource\
            \ to get valid value of this field with description."
          example: BENEFICIARY
        paymentScheduleType:
          type: string
          description: "The payment schedule type. This is a reference data. Please\
            \ use /v1/utilities/referenceData/{paymentScheduleType} resource to get\
            \ valid value of this field."
          example: IMMEDIATE
        futureDatedTransaction:
          $ref: "#/components/schemas/FutureDatedTransaction"
        standingInstruction:
          $ref: "#/components/schemas/StandingInstruction"
        remarks:
          type: array
          items:
            $ref: "#/components/schemas/Remarks"
    CrossBorderWireTransfersPreprocessResponse:
      required:
      - controlFlowId
      type: object
      properties:
        controlFlowId:
          type: string
          description: Control flow Id
          example: "12345678"
        debitDetails:
          $ref: "#/components/schemas/DebitDetails"
        creditDetails:
          $ref: "#/components/schemas/CreditDetails"
        foreignExchangeRate:
          type: number
          description: 'The exchange rate that is applicable for the particular transfer. '
          format: double
          example: 1.8001
        transactionFee:
          type: number
          description: The charges that is being charged by the source bank for doing
            the transfer.
          format: double
          example: 25.25
        feeCurrencyCode:
          type: string
          description: Fee currency code in ISO 4217 Format.
          example: PLN
    ErrorResponse:
      required:
      - code
      - type
      type: object
      properties:
        type:
          type: string
          description: Invalid - Request did not confirm to the specification and
            was unprocessed and rejected. Please fix the value and try again
          enum:
          - error
          - warn
          - invalid
          - fatal
        code:
          type: string
          description: Error code which qualifies the error
        details:
          type: string
          description: Human readable explanation specific to the occurrence of the
            problem
        location:
          type: string
          description: The name of the field that resulted in the error
        moreInfo:
          type: object
          properties: {}
          description: URI to human readable documentation of the error
    AdhocCrossBorderWireTransfersPreprocessRequest:
      required:
      - chargeBearer
      - payeeAccountDetails
      - paymentScheduleType
      - sourceAccountId
      - transactionAmount
      type: object
      properties:
        sourceAccountId:
          type: string
          description: "The source account identifier in encrypted format.Typically,\
            \ this is not displayed to the customer."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        payeeAccountDetails:
          $ref: "#/components/schemas/PayeeAccountDetail"
        transactionAmount:
          type: number
          description: The transaction amount
          format: double
          example: 4500.25
        transactionCurrencyCode:
          type: string
          description: The currency code for the transaction amount in ISO 4217 format.
          example: PLN
        chargeBearer:
          type: string
          description: "Specifies which party(ies) will pay charges due for processing\
            \ of the instruction. Please use /v1/utilities/referenceData/{chargeBearer}\
            \ resource to get valid value of this field with description."
          example: BENEFICIARY
        paymentScheduleType:
          type: string
          description: "The payment schedule type. This is a reference data. Please\
            \ use /v1/utilities/referenceData/{paymentScheduleType} resource to get\
            \ valid value of this field."
          example: IMMEDIATE
        futureDatedTransaction:
          $ref: "#/components/schemas/FutureDatedTransaction"
        standingInstruction:
          $ref: "#/components/schemas/StandingInstruction"
        remarks:
          type: array
          items:
            $ref: "#/components/schemas/Remarks"
    AdhocCrossBorderWireTransfersPreprocessResponse:
      required:
      - controlFlowId
      - foreignExchangeRate
      - transactionFee
      type: object
      properties:
        controlFlowId:
          type: string
          description: Control flow Id
          example: "12345678"
        debitDetails:
          $ref: "#/components/schemas/DebitDetails"
        creditDetails:
          $ref: "#/components/schemas/CreditDetails"
        foreignExchangeRate:
          type: number
          description: 'The exchange rate that is applicable for the particular transfer. '
          format: double
          example: 1.8001
        transactionFee:
          type: number
          description: The charges that is being charged by the source bank for doing
            the transfer.
          format: double
          example: 25.25
        feeCurrencyCode:
          type: string
          description: Fee currency code in ISO 4217 Format.
          example: SGD
    CrossBorderWireTransfersRequest:
      required:
      - controlFlowId
      type: object
      properties:
        controlFlowId:
          type: string
          description: Control flow Id
          example: 6e3774334f724a2b7947663653712f52456f524c41797038516a59347a437549564a77755676376e616a733d
    CrossBorderWireTransfersResponse:
      required:
      - sourceAccountDetails
      - transactionReferenceId
      type: object
      properties:
        transactionReferenceId:
          type: string
          description: The unique transaction reference Id used to identify this transaction
            from all the other transactions
          example: HBKFT160129X001373
        sourceAccountDetails:
          $ref: "#/components/schemas/SourceAccountDetails"
    SourceAccounts:
      required:
      - displaySourceAccountNumber
      - sourceAccountCurrencyCode
      - sourceAccountId
      type: object
      properties:
        sourceAccountId:
          type: string
          description: "The primary identifier for ownership of an account.The source\
            \ account identifier in encrypted format.Typically, this is not displayed\
            \ to the customer,use displayAccountNumber instead."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        displaySourceAccountNumber:
          type: string
          description: A masked account number that can be displayed to the customer
          example: XXXXXX2364
        productName:
          type: string
          description: The name of the product
          example: Personal Checking Account
        sourceAccountCurrencyCode:
          type: string
          description: The currency code of the source account in ISO 4217 format
          example: SGD
        accountNickname:
          type: string
          description: The nickname of the account assigned by the customer
          example: Credit Card Account for My Travels
        accountGroup:
          type: string
          description: "Account Group associated with the source Account.This is a\
            \ reference data field. Please use /v1/utilities/referenceData/{accountGroup}\
            \ resource to get valid value of this field with description."
          example: SAVINGS_AND_INVESTMENTS
        availableBalance:
          type: number
          description: The available balance including any pending or in progress
            deposits and withdrawals
          format: double
          example: 50000.25
    PayeeSourceAccountCombinations:
      required:
      - displayPayeeAccountNumber
      - payeeId
      type: object
      properties:
        payeeId:
          type: string
          description: "Unique identifier associated with the payee.Typically, this\
            \ is not displayed to the customer."
          example: C$0003019202$AU$XX$01000540000001
        displayPayeeAccountNumber:
          type: string
          description: The display account number of the destination account.
          example: XXXXXX2364
        payeeAccountCurrencyCode:
          type: string
          description: The currency code of the payee account in ISO 4217 format
          example: SGD
        payeeName:
          type: string
          description: Name of the payee.
          example: Mark Jacobs
        payeeNickName:
          type: string
          description: Payee account nick name
          example: James
        payeeBankDetails:
          $ref: "#/components/schemas/PayeeBankDetails"
        sourceAccountIds:
          $ref: "#/components/schemas/SourceAccountIds"
    FutureDatedTransaction:
      required:
      - scheduleDate
      type: object
      properties:
        scheduleDate:
          type: string
          description: Date on which the future transaction is scheduled in ISO 8601
            format YYYY-MM-DD.
          format: date
          example: 2017-12-15
    StandingInstruction:
      required:
      - paymentFrequency
      - standingInstructionStartDate
      type: object
      properties:
        standingInstructionStartDate:
          type: string
          description: Standing instruction start date in ISO 8601 format YYYY-MM-DD.
          format: date
          example: 2017-12-12
        paymentFrequency:
          type: string
          description: "The frequency of payment. This is a reference data. Please\
            \ use /v1/utilities/referenceData/{paymentFrequency} resource to get valid\
            \ value of this field."
          example: MONTHLY
        perpetualFlag:
          type: boolean
          description: Flag to indicate if the standing instruction will be continued
            until cancellation.
          example: true
        standingInstructionEndDate:
          type: string
          description: Standing instruction end date in ISO 8601 date format YYYY-MM-DD.
          format: date
          example: 2018-10-15
    Remarks:
      required:
      - remarks
      type: object
      properties:
        remarks:
          type: string
          description: Free text that usually describes purpose of payment.
          example: Personal
    DebitDetails:
      type: object
      properties:
        transactionDebitAmount:
          type: number
          description: The transaction debit amount.
          format: double
          example: 10000.25
        currencyCode:
          type: string
          description: The currency code for the debit amount in ISO 4217 format
          example: GBP
    CreditDetails:
      type: object
      properties:
        transactionCreditAmount:
          type: number
          description: The transaction credit amount.
          format: double
          example: 18050.45
        currencyCode:
          type: string
          description: The currency code for the credit amount in ISO 4217 format
          example: SGD
    PayeeAccountDetail:
      required:
      - payeeAccountNumber
      - payeeCurrencyCode
      type: object
      properties:
        payeeAccountNumber:
          type: string
          description: The account number of the destination account
          example: "251212582364"
        accountIbanFlag:
          type: boolean
          description: This field is to indicate whether the account number is IBAN
            or not
          example: true
        payeeName:
          type: string
          description: Name of the payee.
          example: Mark Jacobs
        payeeNickName:
          type: string
          description: The nick name of the payee assigned by the customer.
          example: MarkJ
        payeeCurrencyCode:
          type: string
          description: The currency code of the destination account in ISO 4217 format
          example: SGD
        payeeAddress:
          $ref: "#/components/schemas/PayeeAddress"
        payeeBankDetails:
          $ref: "#/components/schemas/PayeeBankDetails"
    SourceAccountDetails:
      required:
      - displaySourceAccountNumber
      type: object
      properties:
        sourceAccountId:
          type: string
          description: "The source account identifier in encrypted format.Typically,\
            \ this is not displayed to the customer."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        displaySourceAccountNumber:
          type: string
          description: A masked account number that can be displayed to the customer
          example: XXXXXX2364
        sourceAccountCurrencyCode:
          type: string
          description: The currency code of the source account in ISO 4217 format
          example: PLN
        sourceAccountAvailableBalance:
          type: number
          description: The available balance including any pending or in progress
            deposits and withdrawals.
          format: double
          example: 50000.25
    PayeeBankDetails:
      required:
      - globalBankCode
      type: object
      properties:
        payeeBankName:
          type: string
          description: Name of the bank.
          example: HSBC Bank
        globalBankCode:
          type: string
          description: This field is to indicate the SWIFT code(Society for Worldwide
            Interbank Financial Telecommunication code). An internationally-recognized
            identification code for banks around the world.
          example: HKBAAU2SBNE
        payeeBankAddress:
          $ref: "#/components/schemas/PayeeBankAddress"
    SourceAccountIds:
      required:
      - sourceAccountId
      type: object
      properties:
        sourceAccountId:
          type: string
          description: The primary identifier for ownership of an account.The source
            account identifier in encrypted format
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
    PayeeAddress:
      required:
      - addressLine1
      type: object
      properties:
        addressLine1:
          type: string
          description: Address line 1
          example: 40A Orchard Road
        addressLine2:
          type: string
          description: Address line 2
          example: "#99-99 Macdonald House"
        addressLine3:
          type: string
          description: Address line 3
          example: Poland-510121
    PayeeBankAddress:
      required:
      - addressLine1
      type: object
      properties:

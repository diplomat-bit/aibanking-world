  description: This API is used to perform the operations for associated with internal
    domestic transfer.
  version: 1.26.0
  x-deployment-reference: "PYMT-D-PaymentInit-PERD-DGL-EA,PYMT-D-PaymentInit-PERD-DGL-EA-TW"

              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /confirmation:
    post:
      tags:
      - Money Movement_Counterparty Management_Payee Management
      summary: Confirm Payee Addition
      description: This API confirms the addition of a payee post Multi Factor Authentication.
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Content-Type"
      - $ref: "#/components/parameters/clientDetails"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPayeeConfirmationRequest"
        required: true
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddPayeeConfirmationResponse"
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr><tr><td>error</td><td>payeeAlreadyExists</td><td>Duplicate
            payee found in records</td></tr><tr><td>error</td><td>paymentMethodNotAllowed</td><td>Payment
            method is not allowd</td></tr></tr><tr><td>error</td><td>maxNumOfPayeesDailyLimitExceeded</td><td>Maximum
            number of payees allowed per day is exceeded</td></tr><tr><td>error</td><td>maximumAttemptsLimitExceeded</td><td>Maximum
            attempt limit exceeded</td></tr><tr><td>error</td><td>bankNameAndBankCodeMismatch</td><td>Bank
            name and bank code is not matching</td></tr><tr><td>error</td><td>invalidAccount</td><td>Account
            is invalid</td></tr><tr><td>error</td><td>invalidControlFlowId</td><td>Control
            Flow Id is invalid</td></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The

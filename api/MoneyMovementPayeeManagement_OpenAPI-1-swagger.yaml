openapi: 3.0.1
info:
  title: MoneyMovementPayeeManagement_OpenAPI
  description: This API is used to perform payee management.
  version: 1.10.0
  x-deployment-reference: CSTF-D-CustRefDataMgmt-ASC-PYEE-DGL-EA
  x-linked-api: CustomerReferenceDataManagement_Associations_Payees_Digital_Domain
servers:
- url: https://127.0.0.1/openapi/v1/moneyMovement/payees
paths:
  /:
    get:
      tags:
      - Money Movement_Counterparty Management_Payee Management
      summary: Retrieve Payee List
      description: This API is used to return a list of payees (active and inactive)
        or destination accounts for the customer who authorized your app.
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/clientDetails"
      - name: paymentType
        in: query
        description: "The payment type.This is a reference data field. Please use\
          \ /v1/apac/utilities/referenceData/{paymentType} resource to get valid value\
          \ of this field with description. You can use paymentType as referenceCode\
          \ parameter to retrieve the values."
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: payeeStatus
        in: query
        description: "The payee status. This is a reference data field. Please use\
          \ /v1/utilities/referenceData/{payeeStatus} resource to get valid value\
          \ of this field with description."
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: nextStartIndex
        in: query
        description: In some cases there is more data than what can be returned in
          a single response. If there is additional data available a nextStartIndex
          will be returned. Pass the nextStartIndex in your next request to retrieve
          the next set of data.
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayeeListResponse"
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credentials are missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: <table><tr><td>error</td><td>resourceNotFound</td><td>Empty
            resource/resource not found</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
      - Money Movement_Counterparty Management_Payee Management
      summary: Add Payee
      description: "This API enables customer to add payees  for internal/external\
        \ bill payment , money transfer etc."
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Content-Type"
      - $ref: "#/components/parameters/clientDetails"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPayeeRequest"
        required: true
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddPayeeResponse"
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr><tr><td>error</td><td>payeeAlreadyExists</td><td>Duplicate
            payee found in records</td></tr><tr><td>error</td><td>paymentMethodNotAllowed</td><td>Payment
            method is not allowd</td></tr></tr><tr><td>error</td><td>maxNumOfPayeesDailyLimitExceeded</td><td>Maximum
            number of payees allowed per day is exceeded</td></tr><tr><td>error</td><td>maximumAttemptsLimitExceeded</td><td>Maximum
            attempt limit exceeded</td></tr><tr><td>error</td><td>bankNameAndBankCodeMismatch</td><td>Bank
            name and bank code is not matching</td></tr><tr><td>error</td><td>invalidAccount</td><td>Account
            is invalid</td></tr><tr><td>error</td><td>transactionDenied</td><td>Transaction
            Denied</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr><tr><td>error</td><td>mfaRequired</td><td>MFA
            is required</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codegen-request-body-name: AddPayeeRequest
  /{payeeId}:
    delete:
      tags:
      - Money Movement_Counterparty Management_Payee Management
      summary: Delete Payee
      description: This API is used to allow a customer to delete a payee.
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Content-Type"
      - $ref: "#/components/parameters/clientDetails"
      - name: payeeId
        in: path
        description: Unique identifier associated with the payee.
        required: true
        style: simple
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: Successful operation.
          content: {}
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr><tr><td>error</td><td>invalidfavoritePayeeId</td><td>Payee
            Id is invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /{payeeId}/details:
    get:
      tags:
      - Money Movement_Counterparty Management_Payee Management
      summary: This API allows you to retrieve payee details data associated with
        a payee Id.
      description: This API allows you to retrieve payee details data associated with
        a payee Id.
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/clientDetails"
      - name: payeeId
        in: path
        description: Unique identifier associated with the payee.
        required: true
        style: simple
        explode: false
        schema:
          type: string
      - name: fastSystemStatusOverrideFlag
        in: query
        description: This field indicates if overridden logic is required for fast
          system status in final response.
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayeeDetailsResponse"
        "204":
          description: No Content
          content: {}
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr><tr><td>error</td><td>invalidPayee</td><td>Payee
            is invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:

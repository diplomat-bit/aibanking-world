components:
  schemas:
    AddPayeeRequest:
      type: object
      properties:
        internalDomesticPayee:
          $ref: "#/components/schemas/InternalDomesticPayeeAdd"
        externalDomesticPayee:
          $ref: "#/components/schemas/ExternalDomesticPayeeAdd"
        billPaymentPayee:
          $ref: "#/components/schemas/BillPaymentPayeeAdd"
        ibbsPayee:
          $ref: "#/components/schemas/IbbsPayeeAdd"
    AddPayeeResponse:
      required:
      - favoritePayeeId
      type: object
      properties:
        favoritePayeeId:
          type: string
          description: Unique identifier associated with the payee.
          example: 097640000000000000000000000000023702XX0000015
        payeeStatus:
          type: string
          description: "The payee status. This is a reference data field. Please use\
            \ /v1/utilities/referenceData/{payeeStatus} resource to get valid value\
            \ of this field with description."
          example: ACTIVE
    ErrorResponse:
      required:
      - code
      - type
      type: object
      properties:
        type:
          type: string
          description: Invalid - Request did not confirm to the specification and
            was unprocessed and rejected. Please fix the value and try again
          enum:
          - error
          - warn
          - invalid
          - fatal
        code:
          type: string
          description: Error code which qualifies the error
        details:
          type: string
          description: Human readable explanation specific to the occurrence of the
            problem
        location:
          type: string
          description: The name of the field that resulted in the error
        moreInfo:
          type: object
          properties: {}
          description: URI to human readable documentation of the error
    PayeeListResponse:
      required:
      - payeeList
      type: object
      properties:
        payeeList:
          type: array
          items:
            $ref: "#/components/schemas/Payee"
        nextStartIndex:
          type: string
          description: In some cases there is more data than what can be returned
            in a single response. If there is additional data available a nextStartIndex
            will be returned. Pass the nextStartIndex in your next request to retrieve
            the next set of data.
          example: "11"
    PayeeDetailsResponse:
      type: object
      properties:
        internalDomesticPayee:
          $ref: "#/components/schemas/InternalDomesticPayee"
        externalDomesticPayee:
          $ref: "#/components/schemas/ExternalDomesticPayee"
        billPaymentPayee:
          $ref: "#/components/schemas/BillPaymentPayee"
        ibbsPayee:
          $ref: "#/components/schemas/IbbsPayee"
        citiGlobalTransferpayee:
          $ref: "#/components/schemas/CitiGlobalTransferpayee"
        crossBorderWireTransferPayee:
          $ref: "#/components/schemas/CrossBorderWireTransferPayee"
        sepaTransferPayee:
          $ref: "#/components/schemas/SepaTransferPayee"
    AddPayeeConfirmationRequest:
      required:
      - controlFlowId
      type: object
      properties:
        controlFlowId:
          type: string
          description: It is used to control the flow for subsequent requests in the
            session.
          example: 6e3774334f724a2b7947663653712f52456f524c41797038516a59347a437549564a77755676376e616a733d
    AddPayeeConfirmationResponse:
      required:
      - favoritePayeeId
      type: object
      properties:
        favoritePayeeId:
          type: string
          description: Unique identifier associated with the payee.
          example: 097640000000000000000000000000023702XX0000015
        payeeStatus:
          type: string
          description: "The payee status. This is a reference data field. Please use\
            \ /v1/apac/utilities/referenceData/{payeeStatus} resource to get valid\
            \ value of this field with description. You can use payeeStatus as reference\
            \ code parameter to retrieve the values."
          example: ACTIVE
    InternalDomesticPayeeAdd:
      required:
      - payeeName
      - payeeNickName
      - payeeNotes
      - payeeType
      type: object
      properties:
        payeeType:
          type: string
          description: "Identifies the type of payee based on the destination of the\
            \ payee.This is a reference data field. Please use /v1/utilities/referenceData/{payeeType}\
            \ resource to get valid value of this field with description. "
          example: INTERNAL_DOMESTIC
        payeeName:
          type: string
          description: Name of the payee.
          example: Mark Jacobs
        currencyCode:
          type: string
          description: The currency code of the payee account in ISO 4217 format
          example: RUB
        payeeNickName:
          type: string
          description: The nick name of the payee assigned by the customer.
          example: MarkJ
        paymentPriority:
          type: string
          description: "Priority to the payment used to identify urgency. This is\
            \ a reference data field. Please use /v1/utilities/referenceData/{paymentPriority}\
            \ resource to get valid value of this field with description."
          example: EXECUTIVE_PAYMENTS
        payeeNotes:
          type: string
          description: Free text that usually describes purpose of payment.
          example: Personal
        accountNumber:
          type: string
          description: Account number of the payee.
          example: "09125812364"
        cardNumber:
          type: string
          description: Card number of the payee.
          example: "4201125415944521"
    ExternalDomesticPayeeAdd:
      required:
      - accountNumber
      - payeeName
      - payeeNickName
      - payeeNotes
      - payeeType
      type: object
      properties:
        payeeType:
          type: string
          description: "Identifies the type of payee based on the destination of the\
            \ payee. This is a reference data field. Please use /v1/utilities/referenceData/{payeeType}\
            \ resource to get valid value of this field with description. "
          example: EXTERNAL_DOMESTIC
        currencyCode:
          type: string
          description: The currency code of the payee account in ISO 4217 format
          example: AUD
        payeeName:
          type: string
          description: Name of the payee.
          example: Matt William
        payeeNickName:
          type: string
          description: The nick name of the payee assigned by the customer.
          example: Matt
        paymentPriority:
          type: string
          description: "Priority to the payment used to identify urgency. This is\
            \ a reference data field. Please use /v1/utilities/referenceData/{paymentPriority}\
            \ resource to get valid value of this field with description."
          example: EXECUTIVE_PAYMENTS
        payeeNotes:
          type: string
          description: Free text that usually describes purpose of payment.
          example: Family maintenance
        accountNumber:
          type: string
          description: Account number of the payee.
          example: "251212582364"
        beneficiaryBankName:
          type: string
          description: Name of the bank.
          example: HSBC Bank
        beneficiaryBankCode:
          type: string
          description: The bank code of the external payee account.
          example: "44525101"
        utilityBillPaymentIndicator:
          type: string
          description: "Indicator to identify if the transfer is Utility Bill Payment.\
            \ Applicable only for Russia. This is a reference data field. Please use\
            \ /v1/utilities/referenceData/{utilityBillPaymentIndicator} resource to\
            \ get valid value of this field with description."
          example: "Y"
        beneficiaryIndividualTaxNumber:
          type: string
          description: Indicator to identify if the transfer is Utility Bill Payment.
            Applicable only for Russia.
          example: "1234567890"
        beneficiaryTaxRegistrationCode:
          type: string
          description: Beneficiary Tax registration code assigned by RU Government
          example: "987654321"
    BillPaymentPayeeAdd:
      required:
      - payeeNickName
      - payeeNotes
      - payeeType
      type: object
      properties:
        payeeType:
          type: string
          description: "Identifies the type of payee based on the destination of the\
            \ payee. This is a reference data field. Please use /v1/utilities/referenceData/{payeeType}\
            \ resource to get valid value of this field with description. "
          example: BILL_PAYMENT
        currencyCode:
          type: string
          description: The currency code of the payee account in ISO 4217 format
          example: RUB
        payeeNickName:
          type: string
          description: The nick name of the payee assigned by the customer.
          example: Beeline
        paymentPriority:
          type: string
          description: "Priority to the payment used to identify urgency. This is\
            \ a reference data field. Please use /v1/utilities/referenceData/{paymentPriority}\
            \ resource to get valid value of this field with description."
          example: EXECUTIVE_PAYMENTS
        payeeNotes:
          type: string
          description: Free text that usually describes purpose of payment.
          example: Mobile bill
        merchantName:
          type: string
          description: ' The name of the merchant.'
          example: Verizone Wireless
        merchantNameLocal:
          type: string
          description: ' The name of the merchant in local language.'
          example: "Ð‘Ð˜Ð›Ð\x90Ð™Ð\x9d"
        merchantNumber:
          type: string
          description: ' A string that uniquely identifies a merchant.'
          example: "11000125781"
        merchantInformation:
          type: array
          items:
            $ref: "#/components/schemas/MerchantInformation"
    IbbsPayeeAdd:
      required:
      - accountNumber
      - payeeName
      - payeeNickName
      - payeeNotes
      - payeeType
      type: object
      properties:
        payeeType:
          type: string
          description: "Identifies the type of payee based on the destination of the\
            \ payee. This is a reference data field. Please use /v1/utilities/referenceData/{payeeType}\
            \ resource to get valid value of this field with description. "
          example: INTERNAL_DOMESTIC
        currencyCode:
          type: string
          description: The currency code of the payee account in ISO 4217 format
          example: RUB
        payeeName:
          type: string
          description: Name of the payee.
          example: Mark Jacobs
        payeeNickName:
          type: string
          description: The nick name of the payee assigned by the customer.
          example: MarkJ
        paymentPriority:
          type: string
          description: "Priority to the payment used to identify urgency. This is\
            \ a reference data field. Please use /v1/utilities/referenceData/{paymentPriority}\
            \ resource to get valid value of this field with description."
          example: EXECUTIVE_PAYMENTS
        payeeNotes:
          type: string
          description: Free text that usually describes purpose of payment.
          example: Tax
        accountNumber:
          type: string
          description: Account number of the payee.
          example: XXXXXX2364
        beneficiaryBankName:
          type: string
          description: Name of the bank.
          example: HSBC Bank
        beneficiaryBankCode:
          type: string
          description: The bank code of the external payee account.
          example: "44525101"
        utilityBillPaymentIndicator:
          type: string
          description: "Indicator to identify if the transfer is Utility Bill Payment.\
            \ Applicable only for Russia. This is a reference data field. Please use\
            \ /v1/utilities/referenceData/{utilityBillPaymentIndicator} resource to\
            \ get valid value of this field with description."
          example: "Y"
        beneficiaryIndividualTaxNumber:
          type: string
          description: Indicator to identify if the transfer is Utility Bill Payment.
            Applicable only for Russia.
          example: "1234567890"
        beneficiaryTaxRegistrationCode:
          type: string
          description: Beneficiary tax registration code assigned by Russia government.
          example: "987654321"
    Payee:
      required:
      - accountId
      - displayAccountNumber
      - favoritePayeeId
      - payeeName
      - payeeNickname
      - payeeStatus
      - paymentType
      type: object
      properties:
        favoritePayeeId:
          type: string
          description: "The unique Id of the payee.Typically,this is not displayed\
            \ to the customer."
          example: C$0003019202$AU$XX$01000540000001
        payeeName:
          type: string
          description: The name of the payee
          example: Singtel
        payeeNickname:
          type: string
          description: The nickname of the payee
          example: Singtel
        paymentType:
          type: string
          description: "The payment type.This is a reference data field. Please use\
            \ /v1/apac/utilities/referenceData/{paymentType} resource to get valid\
            \ value of this field with description. You can use paymentType as reference\
            \ code parameter to retrieve the values."
          example: LOCAL_CITI
        displayAccountNumber:
          type: string
          description: A masked account number that can be displayed to the customer.
          example: XXXXXX2364
        accountId:
          type: string
          description: "The account identifier of the payee in encrypted format.Typically,\
            \ this is not displayed to the customer,use displayAccountNumber instead."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        currencyCode:
          type: string
          description: The currency code of the account in ISO 4217 format
          example: USD
        paymentMethods:
          type: array
          items:
            $ref: "#/components/schemas/PaymentMethod"

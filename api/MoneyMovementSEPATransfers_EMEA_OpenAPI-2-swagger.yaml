openapi: 3.0.1
info:
  title: MoneyMovementSEPATransfers_EMEA_OpenAPI
  description: This API is used to perform the operations associated with SEPA transfers.
  version: 1.0.0
  x-linked-api: PaymentInitiation_SEPATransfers_Digital_Domain
  x-deployment-reference: PYMT-D-PaymentInit-SEPA-DGL-EM
servers:
- url: https://127.0.0.1/openapi/v1/emea/moneyMovement/sepaTransfers
paths:
  /payees/sourceAccounts:
    get:
      tags:
      - Money Movement_Transfers_Inter Institution PTP Transfer
      summary: Retrieve Destination Source Account SEPA.
      description: "This API returns the valid combinations of SEPA transfer destination\
        \ and source accounts. This information may be used to prepare a valid source\
        \ list for a selected destination, or vice versa"
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/clientDetails"
      - name: nextStartIndex
        in: query
        description: In some cases there is more data than what can be returned in
          a single response. If there is additional data available a nextStartIndex
          will be returned. Pass the nextStartIndex in your next request to retrieve
          the next set of data.
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SepaTransfersAccountPayeeEligibilityResponse"
        "204":
          description: No Content
          content: {}
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /preprocess:
    post:
      tags:
      - Money Movement_Transfers_Inter Institution PTP Transfer
      summary: Create SEPA Transfer.
      description: This API creates a new SEPA transfer and verifies that there are
        no errors. The response from this resource should be used to construct a pre-confirmation
        page so the customer can review the transaction before confirming.
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Content-Type"
      - $ref: "#/components/parameters/clientDetails"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SepaTransfersPreprocessRequest"
        required: true
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SepaTransfersPreprocessResponse"
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr><tr><td>error</td><td>invalidPayee</td><td>Payee
            is invalid</td></tr><tr><td>error</td><td>invalidSourceAccount</td><td>Source
            account is invalid</td></tr><tr><td>error</td><td>invalidAccountCombination</td><td>Invalid
            source and destination account combination</td></tr><tr><td>error</td><td>invalidTransactionAmount</td><td>Transaction
            amount is invalid</td></tr><tr><td>error</td><td>transactionAmountExceedsMaximum</td><td>Allowed
            transaction amount limit for this transaction exceeded</td></tr><tr><td>error</td><td>transactionAmountBelowMinimum</td><td>Transaction
            amount below minimum amount</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codegen-request-body-name: SepaTransfersPreprocessRequest
  /preprocess/adhoc:
    post:
      tags:
      - Money Movement_Transfers_Inter Institution PTP Transfer
      summary: Create adhoc SEPA transfer.
      description: This API creates a new SEPA transfer to an adhoc destination and
        verifies there are no errors. The destination does not need to be in a payee
        list. The response from this resource should be used to construct a pre-confirmation
        page so the customer can review the transaction before confirming.
      parameters:
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Content-Type"
      - $ref: "#/components/parameters/clientDetails"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdhocSepaTransfersPreprocessRequest"
        required: true
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdhocSepaTransfersPreprocessResponse"
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid parameters</td></tr><tr><td>error</td><td>invalidAccount</td><td>Account
            is invalid</td></tr><tr><td>error</td><td>invalidTransactionAmount</td><td>Transaction
            amount is invalid</td></tr><tr><td>error</td><td>transactionAmountExceedsMaximum</td><td>Allowed
            transaction amount limit for this transaction exceeded</td></tr><tr><td>error</td><td>transactionAmountBelowMinimum</td><td>Transaction
            amount below minimum amount</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: <table><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credential is missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: <table><tr><td>error</td><td>accessNotConfigured</td><td>Access
            is not configured for this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: <table><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codegen-request-body-name: AdhocSepaTransfersPreprocessRequest
components:
  schemas:
    SepaTransfersAccountPayeeEligibilityResponse:
      required:
      - sourceAccounts
      type: object
      properties:
        sourceAccounts:
          type: array
          items:
            $ref: "#/components/schemas/SourceAccounts"
        payeeSourceAccountCombinations:
          type: array
          items:
            $ref: "#/components/schemas/PayeeSourceAccountCombinations"
        nextStartIndex:
          type: string
          description: In some cases there is more data than what can be returned
            in a single response. If there is additional data available a nextStartIndex
            will be returned. Pass the nextStartIndex in your next request to retrieve
            the next set of data.
          example: "11"
    SourceAccountIds:
      required:
      - sourceAccountId
      type: object
      properties:
        sourceAccountId:
          type: string
          description: The primary identifier for ownership of an account.The source
            account identifier in encrypted format
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
    SourceAccounts:
      required:
      - accountGroup
      - displaySourceAccountNumber
      - sourceAccountCurrencyCode
      - sourceAccountId
      type: object
      properties:
        sourceAccountId:
          type: string
          description: "The primary identifier for ownership of an account.The source\
            \ account identifier in encrypted format.Typically, this is not displayed\
            \ to the customer,use displayAccountNumber instead."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        accountNickname:
          type: string
          description: The nickname of the account assigned by the customer
          example: Credit Card Account for My Travels
        productName:
          type: string
          description: The name of the product
          example: Personal Checking Account
        displaySourceAccountNumber:
          type: string
          description: A masked account number that can be displayed to the customer
          example: XXXXXX2364
        sourceAccountCurrencyCode:
          type: string
          description: The currency code of the source account in ISO 4217 format
          example: SGD
        accountGroup:
          type: string
          description: "Account Group associated with the source Account.This is a\
            \ reference data field. Please use /v1/utilities/referenceData/{accountGroup}\
            \ resource to get valid value of this field with description."
          example: SAVINGS_AND_INVESTMENTS
        availableBalance:
          type: number
          description: The available balance including any pending or in progress
            deposits and withdrawals
          format: double
          example: 50000.25
        nextPaymentAmount:
          type: number
          description: The next payment amount due.
          format: double
          example: 4500.25
    PayeeSourceAccountCombinations:
      required:
      - displayPayeeAccountNumber
      - payeeId
      - sourceAccountIds
      type: object
      properties:
        payeeId:
          type: string
          description: "Unique identifier associated with the payee.Typically, this\
            \ is not displayed to the customer."
          example: C$0003019202$AU$XX$01000540000001
        displayPayeeAccountNumber:
          type: string
          description: The display account number of the destination account.
          example: XXXXXX2364
        payeeAccountCurrencyCode:
          type: string
          description: The currency code of the payee account in ISO 4217 format
          example: SGD
        payeeNickName:
          type: string
          description: Payee account nick name
          example: James
        bankDetails:
          $ref: "#/components/schemas/BankDetails"
        payeeAddress:
          $ref: "#/components/schemas/PayeeAddress"
        transferPurpose:
          type: string
          description: "Purpose of transfer. Applicable if paymentMethod is GIRO,\
            \ FAST. This is a reference data field.This is a reference data field.\
            \ Please use /v1/utilities/referenceData/{transferPurpose} resource to\
            \ get valid value of this field with description."
          example: CASH_DISBURSEMENT
        sourceAccountIds:
          type: array
          items:
            $ref: "#/components/schemas/SourceAccountIds"
    PayeeAddress:
      type: object
      properties:
        addressLine1:
          type: string
          description: Address line 1
          example: Road 66 Street
        addressLine2:
          type: string
          description: Address line2
          example: Texas
        addressLine3:
          type: string
          description: Address line 3
          example: US
        countryName:
          type: string
          description: "Country Name.This is a reference data field. Please use /v1/utilities/referenceData/{countryName}\
            \ resource to get valid value of this field with description."
          example: AUSTRALIA
    BankDetails:
      required:
      - globalBankCode
      type: object
      properties:
        globalBankCode:
          type: string
          description: This field is to indicate the SWIFT code(Society for Worldwide
            Interbank Financial Telecommunication code). An internationally-recognized
            identification code for banks around the world.
          example: HKBAAU2SBNE
        bankName:
          type: string
          description: Payee account bank name
          example: HSBC Bank
    SepaTransfersPreprocessRequest:
      required:
      - payeeId
      - sourceAccountId
      - transactionAmount
      type: object
      properties:
        sourceAccountId:
          type: string
          description: "The source account identifier in encrypted format.Typically,\
            \ this is not displayed to the customer."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        payeeId:
          type: string
          description: "The payee identifier in encrypted format.Typically, this is\
            \ not displayed to the customer."
          example: C$0003019202$AU$XX$01000540000001
        transactionAmount:
          type: number
          description: The transaction amount
          format: double
          example: 4500.25
        transactionCurrencyCode:
          type: string
          description: The currency code for the transaction amount in ISO 4217 format.
          example: PLN
        remarks:
          type: array
          items:
            $ref: "#/components/schemas/Remarks"
    SepaTransfersPreprocessResponse:
      required:
      - controlFlowId
      type: object
      properties:
        controlFlowId:
          type: string
          description: Control flow Id
          example: "12345678"
        debitDetails:
          $ref: "#/components/schemas/DebitDetails"
        creditDetails:
          $ref: "#/components/schemas/CreditDetails"
        foreignExchangeRate:
          type: number
          description: 'The exchange rate that is applicable for the particular transfer. '
          format: double
          example: 1.8001
        transactionFee:
          type: number
          description: The charges that is being charged by the source bank for doing
            the transfer.
          format: double
          example: 25.25
        feeCurrencyCode:
          type: string
          description: Fee currency code in ISO 4217 Format.
          example: PLN
    Remarks:
      required:
      - remarks
      type: object
      properties:
        remarks:
          type: string
          description: Free text that usually describes purpose of payment.
          example: Personal
    CreditDetails:
      required:
      - currencyCode
      - transactionCreditAmount
      type: object
      properties:
        transactionCreditAmount:
          type: number
          description: The transaction credit amount.
          format: double
          example: 18050.45
        currencyCode:
          type: string
          description: The currency code for the credit amount in ISO 4217 format
          example: SGD
    DebitDetails:
      required:
      - currencyCode
      - transactionDebitAmount
      type: object
      properties:
        transactionDebitAmount:
          type: number
          description: The transaction debit amount.
          format: double
          example: 10000.25
        currencyCode:
          type: string
          description: The currency code for the debit amount in ISO 4217 format
          example: SGD
    AdhocSepaTransfersPreprocessRequest:
      required:
      - payeeAccountDetails
      - remarks
      - sourceAccountId
      - transactionCurrencyCode
      type: object
      properties:
        sourceAccountId:
          type: string
          description: "The source account identifier in encrypted format.Typically,\
            \ this is not displayed to the customer."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        payeeAccountDetails:
          $ref: "#/components/schemas/PayeeAccountDetails"
        transactionAmount:
          type: number
          description: The transaction amount
          format: double
          example: 4500.25
        transactionCurrencyCode:
          type: string
          description: The currency code for the transaction amount in ISO 4217 format.
          example: PLN
        remarks:
          type: array
          items:
            $ref: "#/components/schemas/Remarks"
    AdhocSepaTransfersPreprocessResponse:
      required:
      - controlFlowId
      - foreignExchangeRate
      type: object
      properties:
        controlFlowId:
          type: string
          description: Control flow Id
          example: "12345678"
        debitDetails:
          $ref: "#/components/schemas/DebitDetails"
        creditDetails:
          $ref: "#/components/schemas/CreditDetails"
        foreignExchangeRate:
          type: number
          description: 'The exchange rate that is applicable for the particular transfer. '
          format: double
          example: 1.8001
        transactionFee:
          type: number
          description: The charges that is being charged by the source bank for doing
            the transfer.
          format: double
          example: 25.25
        feeCurrencyCode:
          type: string
          description: Fee currency code in ISO 4217 Format.
          example: PLN
    PayeeAccountDetails:
      required:
      - payeeAccountNumber
      - payeeName
      type: object
      properties:
        payeeAccountNumber:
          type: string
          description: The account number of the destination account
          example: "251212582364"
        payeeName:
          type: string
          description: Name of the payee.
          example: Mark Jacobs
        payeeNickName:
          type: string
          description: The nick name of the payee assigned by the customer.
          example: MarkJ
        payeeBankDetails:
          $ref: "#/components/schemas/PayeeBankDetails"
        payeeAddress:
          $ref: "#/components/schemas/PayeeAddress"
    PayeeBankDetails:
      required:
      - globalBankCode
      type: object
      properties:
        globalBankCode:
          type: string
          description: This field is to indicate the SWIFT code(Society for Worldwide
            Interbank Financial Telecommunication code). An internationally-recognized
            identification code for banks around the world.
          example: HKBAAU2SBNE
        countryName:
          type: string
          description: "This field is to indicate the name of the country. This is\
            \ a reference data field. Please use /v1/utilities/referenceData/{countryName}\
            \ resource to get valid value of this field with description."
          example: POLAND
    ErrorResponse:
      required:
      - code
      - type
      type: object
      properties:
        type:
          type: string
          description: Invalid - Request did not confirm to the specification and
            was unprocessed and rejected. Please fix the value and try again
          enum:
          - error
          - warn
          - invalid
          - fatal
        code:
          type: string
          description: Error code which qualifies the error
        details:
          type: string
          description: Human readable explanation specific to the occurrence of the
            problem
        location:
          type: string
          description: The name of the field that resulted in the error
        moreInfo:
          type: object
          properties: {}
          description: URI to human readable documentation of the error
  parameters:
    Authorization:
      name: Authorization
      in: header
      description: "The most recent Authorization token. This will have the format\
        \ Bearer + {space} + {accessToken}. Example: Bearer KGNsaWVudF9pZDpjbGllbnRfc2VjcmV0KQ=="
      required: true
      style: simple
      explode: false
      schema:
        type: string
    uuid:
      name: uuid
      in: header
      description: 128 bit random UUID generated uniquely for every request.
      required: true
      style: simple
      explode: false
      schema:
        type: string
    Accept:
      name: Accept
      in: header
      description: Content-Type that are acceptable for the response.
      required: true
      style: simple
      explode: false
      schema:
        type: string
    client_id:
      name: client_id
      in: header
      description: Client ID generated during application registration.
      required: true
      style: simple
      explode: false
      schema:
        type: string
    Content-Type:
      name: Content-Type
      in: header
      description: application/json
      required: true
      style: simple
      explode: false
      schema:
        type: string
    clientDetails:
      name: clientDetails
      in: header
      description: "This field is used to capture device,browser and network information.\
        \ Refer the developer portal for more information.These are the fields which\
        \ will be passed as part of the header devicePrint,deviceTokenCookie,userIpAddress,userAgent,hardwareId,simId,deviceModel,deviceName,deviceOsName,deviceOsVersion,multitaskingSupportFlag,languageSupport,wifiMacAddress,cellTowerId,locationAreaCode,rsaApplicationKey,wapClientId,mobileCarrierCode,mobileCountryCode,osId,geoLongitude,geoLatitude,geoHorizontalAccuracy,geoAltitude,geoAltitudeAccuracy,geoSpeed,geoTimestamp,geoStatus,basicServiceSetId,signalStrength,wifiChannel,serviceSetId"
      required: false
      style: simple
      explode: false
      schema:
        type: string

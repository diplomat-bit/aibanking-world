components:
  schemas:
    RetrievePaymentInitiationTransactionRepeatingPaymentsResponse:
      type: object
      properties:
        nextStartIndex:
          type: string
          description: "The next start index that indicates the next set of records\
            \ to be fetched, if there are available. Typically, this value should\
            \ be populated if the first response has the value of nextStartIndex.It\
            \ is not applicable for the first iteration"
          example: "11"
        standingInstruction:
          type: array
          items:
            $ref: "#/components/schemas/StandingInstruction"
    StandingInstruction:
      required:
      - accountId
      - displayAccountNumber
      - payee
      - paymentFrequency
      - paymentMethod
      - standingInstructionStartDate
      - transactionAmount
      - transactionReferenceId
      type: object
      properties:
        transactionReferenceId:
          type: string
          description: The unique SI reference Id used to identify the payee type/
            transfer from all the other transfers
          example: BIMI51807310002051
        displayAccountNumber:
          type: string
          description: A masked account number that can be displayed to the customer
          example: XXXXXX2391
        accountId:
          type: string
          description: "The account identifier in encrypted format.Typically, this\
            \ is not displayed to the customer."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        paymentMethod:
          type: string
          description: "The acceptable forms of remittance for a given payments and\
            \ transfer transaction.This is a reference data field. Please use /v1/utilities/referenceData/{paymentMethod}\
            \ resource to get valid value of this field with description"
          example: FasterPayments
        bankSortCode:
          type: string
          description: This is specific to UK
          example: 30-00-81
        transactionAmount:
          type: number
          description: Transaction amount in local currency.
          format: double
          example: 4500.25
        payee:
          type: string
          description: The payee name with which this transfer was made with
          example: John Smith
        futureDatedTransaction:
          $ref: "#/components/schemas/FutureDatedTransaction"
        standingInstructionStartDate:
          type: string
          description: Standing instruction start date in ISO 8601 format YYYY-MM-DD.
          format: date
        paymentFrequency:
          type: string
          description: "The frequency of payment. This is a reference data.Please\
            \ use /v1/utilities/referenceData/{paymentFrequency} resource to get valid\
            \ value of this field."
          example: MONTHLY
        nextPaymentDate:
          type: string
          description: Next Transfer transaction date in ISO 8601 date format YYYY-MM-DD.
          format: date
        perpetualFlag:
          type: boolean
          description: Flag to indicate if the standing instruction will be continued
            until cancellation.
          example: true
        standingInstructionEndDate:
          type: string
          description: Standing instruction end date in ISO 8601 date format YYYY-MM-DD.
          format: date
        nextStartIndex:
          type: string
          description: In some cases there is more data than what can be returned
            in a single response. If there is additional data available a nextStartIndex
            will be returned. Pass the nextStartIndex in your next request to retrieve
            the next set of data.
          example: "11"
        paymentType:
          type: string
          description: This defines the type of payment made by customer for which
            SI needs to be enabled.
          example: ALL
        remarks:
          type: string
          description: Bill payment notes. Free text from screen.
          example: Free Text
    FutureDatedTransaction:
      required:
      - scheduleDate
      type: object
      properties:
        scheduleDate:
          type: string
          description: Date on which the set amount will be transferred . Date in
            ISO 8601 date format YYYY-MM-DD.
          format: date
    UpdatePaymentInitiationTransactionRepeatingPaymentsPreprocessRequest:
      required:
      - accountId
      - paymentMethod
      - transactionReferenceId
      type: object
      properties:
        accountId:
          type: string
          description: "The account identifier in encrypted format.Typically, this\
            \ is not displayed to the customer."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        paymentMethod:
          type: string
          description: "The acceptable forms of remittance for a given payments and\
            \ transfer transaction.This is a reference data field. Please use    \
            \ /v1/utilities/referenceData/{paymentMethod} resource to get valid value\
            \ of this field with description"
          example: FasterPayments
        bankSortCode:
          type: string
          description: This is specific to UK
          example: 30-00-81
        transactionReferenceId:
          type: string
          description: The unique SI reference Id used to identify the payee type/
            transfer from all the other transfers
          example: BIMI51807310002051
        transactionAmount:
          type: number
          description: Transaction amount in local currency.
          format: double
          example: 4500.25
        futureDatedTransaction:
          $ref: "#/components/schemas/FutureDatedTransaction"
        standingInstruction:
          $ref: "#/components/schemas/StandingInstructionPreprocess"
        remarks:
          type: string
          description: Bill payment notes. Free text from screen.
          example: Free text
    StandingInstructionPreprocess:
      type: object
      properties:
        standingInstructionStartDate:
          type: string
          description: Standing instruction start date in ISO 8601 format YYYY-MM-DD.
          format: date
          example: 2020-12-22
        paymentFrequency:
          type: string
          description: "The frequency of payment. This is a reference data.Please\
            \ use /v1/utilities/referenceData/{paymentFrequency} resource to get valid\
            \ value of this field."
          example: MONTHLY
        perpetualFlag:
          type: boolean
          description: Flag to indicate if the standing instruction will be continued
            until cancellation.
          example: true
        standingInstructionEndDate:
          type: string
          description: Standing instruction end date in ISO 8601 date format YYYY-MM-DD.
          format: date
          example: 2020-12-22
    UpdatePaymentInitiationTransactionRepeatingPaymentsPreprocessResponse:
      required:
      - controlFlowId
      type: object
      properties:
        controlFlowId:
          type: string
          description: This is control Flow id for next API
        debitDetails:
          type: array
          items:
            $ref: "#/components/schemas/DebitDetails"
        creditDetails:
          type: array
          items:
            $ref: "#/components/schemas/CreditDetails"
        foreignExchangeRate:
          type: number
          description: Exchange rate
          format: double
          example: 1.1021
        transactionFee:
          type: number
          description: Transaction fee
          format: double
          example: 500.25
        feeCurrencyCode:
          type: string
          description: This is fee currency code in ISO 4217 format.
          example: USD
    DebitDetails:
      type: object
      properties:
        transactionDebitAmount:
          type: number
          description: The transaction debit amount.
          format: double
          example: 4500.25
        currencyCode:
          type: string
          description: The currency code for the debit amount in ISO 4217
          example: EUR
    CreditDetails:
      type: object
      properties:
        transactionCreditAmount:
          type: number
          description: The transaction credit amount
          format: double
          example: 19178.72
        currencyCode:
          type: string
          description: The currency code for the credit amount in ISO 4217
          example: PLN
    UpdatePaymentInitiationTransactionRepeatingPaymentsConfirmationRequest:
      type: object
      properties:
        controlFlowId:
          type: string
          description: Control flow id is used to control the flow for subsequent
            requests in the session.
          example: 6e3774334f724a2b7947663653712f52456f524c41797038516a59347a437549564a77755676376e616a733d
    UpdatePaymentInitiationTransactionRepeatingPaymentsConfirmationResponse:
      required:
      - accountId
      - transactionReferenceId
      type: object
      properties:
        accountId:
          type: string
          description: "The account identifier in encrypted format.Typically, this\
            \ is not displayed to the customer."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        transactionReferenceId:
          type: string
          description: The unique SI reference Id used to identify the payee type/
            transfer from all the other transfers
          example: BIMI51807310002051
        transactionAmount:
          type: number
          description: Transaction amount in local currency.
          format: double
          example: 4500.25
        futureDatedTransaction:
          $ref: "#/components/schemas/FutureDatedTransaction"
        standingInstruction:
          $ref: "#/components/schemas/StandingInstruction"
        remarks:
          type: string
          description: Bill payment notes. Free text from screen.
    ErrorResponse:
      required:
      - code
      - type
      type: object
      properties:
        type:
          type: string
          description: Invalid - Request did not confirm to the specification and
            was unprocessed and rejected. Please fix the value and try again
          enum:
          - error
          - warn
          - invalid
          - fatal
        code:
          type: string
          description: Error code which qualifies the error
        details:
          type: string
          description: Human readable explanation specific to the occurrence of the
            problem
        location:
          type: string
          description: The name of the field that resulted in the error
        moreInfo:
          type: object
          properties: {}
          description: URI to human readable documentation of the erro

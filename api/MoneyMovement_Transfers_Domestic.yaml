components:
  schemas:
    PayeeAccountDetail:
      required:
      - payeeAccountNumber
      - payeeCurrencyCode
      type: object
      properties:
        payeeAccountNumber:
          type: string
          description: This is beneficiairyAccountNumber
          example: "558877744"
        accountIbanFlag:
          type: boolean
          description: This field is to indicate whether the account number is IBAN
            or not
          example: true
        payeeName:
          type: string
          description: This is payeeName
          example: MarkJacobs
        payeeNickName:
          type: string
          description: "This is beneficiaryNickName,applicable for UK"
          example: Mark
        payeeCurrencyCode:
          type: string
          description: The currency code of the destination account in ISO 4217 format
          example: SGD
        payeeAddress:
          $ref: "#/components/schemas/PayeeAddress"
        payeeBankDetails:
          $ref: "#/components/schemas/PayeeBankDetails"
    PayeeBankDetails:
      required:
      - swiftCode
      type: object
      properties:
        swiftCode:
          type: string
          description: This field is to indicate the SWIFT code(Society for Worldwide
            Interbank Financial Telecommunication code). An internationally-recognized
            identification code for banks around the world.
          example: HKBAAU2SBNE
        payeeBankAddress:
          $ref: "#/components/schemas/PayeeBankAddress"
        payeeBankName:
          type: string
          description: Name of the bank
          example: HSBC Bank
    Sepa:
      required:
      - sourceAccountId
      - transactionCurrencyCode
      type: object
      properties:
        sourceAccountId:
          type: string
          description: "The source account identifier in encrypted format.Typically,\
            \ this is not displayed to the customer."
          example: 3255613852316f2b4d4d796c344e38756339654972776f663745446e6d4c32486f455a4165374a476858343d
        transactionCurrencyCode:
          type: string
          description: "This is an indicator if transfer is to be done in source or\
            \ destination currency, this is CVT field transferCurrencyIndicator"
          example: PLN
        transactionAmount:
          type: number
          description: Transaction Amount
          format: double
          example: 4500.21
        payeeAccountInfo:
          $ref: "#/components/schemas/PayeeAccountInfo"
        remarks:
          type: array
          items:
            $ref: "#/components/schemas/Remarks"
    PayeeAccountInfo:
      required:
      - payeeAccountNumber
      - payeeName
      type: object
      properties:
        payeeAccountNumber:
          type: string
          description: The account number of the destination account
          example: "251212582364"
        payeeName:
          type: string
          description: Name of the payee
          example: MARC
        payeeNickName:
          type: string
          description: The nick name of the payee assigned by the customer.
          example: MarcJ
        payeeAddress:
          $ref: "#/components/schemas/PayeeAddress"
        payeeBankMiniDetail:
          $ref: "#/components/schemas/PayeeBankMiniDetail"
    PayeeBankMiniDetail:
      required:
      - swiftCode
      type: object
      properties:
        swiftCode:
          type: string
          description: This field is to indicate the SWIFT code(Society for Worldwide
            Interbank Financial Telecommunication code). An internationally-recognized
            identification code for banks around the world.
          example: HKBAAU2SBNE
        countryName:
          type: string
          description: "This field is to indicate the name of the country. This is\
            \ a reference data field. Please use /v1/utilities/referenceData/{countryName}\
            \ resource to get valid value of this field with description."
          example: SINGAPORE
        payeeBankName:
          type: string
          description: Name of the bank
          example: HSBC Bank
    ExecutePaymentInitiationTransactionAdhocMultipleTransferAsyncResponse:
      type: object
      properties:
        transactionStatus:
          type: string
          description: This is transaction status
        citiBundleId:
          type: string
          description: This is bundle/ bulk id of the transactions from Citi
        totalTransactionCount:
          type: string
          description: This is total number of transactions
        controlFlowId:
          type: string
          description: This is control flow id
    ExecutePaymentInitiationTransactionAdhocMultipleTransferConfirmationAsyncResponse:
      type: object
      properties:
        transactionStatus:
          type: string
          description: This is transaction status
        bundleId:
          type: string
          description: This is bundle/ bulk id of the transactions from TPP
        citiBundleId:
          type: string
          description: This is bundle/ bulk id of the transactions from CITI
        totalTransactionCount:
          type: string
          description: This is total number of transactions
    ErrorResponse:
      required:
      - code
      - type
      type: object
      properties:
        type:
          type: string
          description: Invalid - Request did not confirm to the specification and
            was unprocessed and rejected. Please fix the value and try again
          enum:
          - error
          - warn
          - invalid
          - fatal
        code:
          type: string
          description: Error code which qualifies the error
        details:
          type: string
          description: Human readable explanation specific to the occurrence of the
            problem
        location:
          type: string
          description: The name of the field that resulted in the error
        moreInfo:
          type: object
          properties: {}
          description: URI to human readable documentation of the error

  parameters:
    # ... (parameters from all three files)

      summary: Submit Multiple Transfers for Adhoc Payees
      description: "This API is used for Citi Business customers to process multiple\
        \ payment requests for Adhoc payees. In case authorization is required, this\
        \ API will throw mfa Requried error. Prerequisite: Retrieve the applicable\
        \ payment types, eligible source accounts from RetrievePaymentInitiationTransactionBulkSourceAccountAndPayeeEligibility\
        \ API."

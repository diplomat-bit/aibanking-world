openapi: 3.0.1
info:
  title: OnboardingUnsecuredProductsApplicationMaintenance_EMEA_OpenAPI
  description: This API is used to perform the maintenance of the onboarding application
    for unsecured product.
  version: 1.0.0
  x-deployment-reference: ""
  x-linked-api: "AddUnsecuredProduct, UpdateUnsecuredProduct"
servers:
- url: "https://127.0.0.1/openapi/v1/emea/onboarding/applications/{applicationId}/products/unsecured"
paths:
  /:
    put:
      tags:
      - Acquisitions_Application Management_Application Submission and Tracking
      summary: Update Unsecured Product Details
      description: This API allows the customer to update an unsecured product to
        existing application.
      parameters:
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/countryCode"
      - $ref: "#/components/parameters/businessCode"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/Accept-Language"
      - $ref: "#/components/parameters/Content-Type"
      - $ref: "#/components/parameters/clientDetails"
      requestBody:
        description: Unsecured product add to the application.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnsecuredProductUpdateRequest"
        required: true
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnsecuredProductUpdateResponse"
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid Parameters</td></tr><tr><td>invalid</td><td>productAgreementExpired</td><td>Agreement
            duration of this product is expired</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorList"
        "401":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credentials are missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorList"
        "403":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td><td>More
            Info</td></tr><tr><td>invalid</td><td>accessNotConfigured</td><td>The
            request operation is not configured to access this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorList"
        "404":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td><td>More
            Info</td></tr><tr><td>error</td><td>resourceNotFound</td><td>The requested
            resource is not found</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorList"
        "500":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorList"
      x-codegen-request-body-name: UnsecuredProductUpdateRequest
    post:
      tags:
      - Acquisitions_Application Management_Application Submission and Tracking
      summary: Submit Unsecured Application
      description: This API allows customer to add an unsecured product to an application
      parameters:
      - $ref: "#/components/parameters/client_id"
      - $ref: "#/components/parameters/Authorization"
      - $ref: "#/components/parameters/countryCode"
      - $ref: "#/components/parameters/businessCode"
      - $ref: "#/components/parameters/uuid"
      - $ref: "#/components/parameters/Accept"
      - $ref: "#/components/parameters/Accept-Language"
      - $ref: "#/components/parameters/Content-Type"
      - $ref: "#/components/parameters/clientDetails"
      requestBody:
        description: Unsecured product add to the application.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnsecuredProductAddRequest"
        required: true
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnsecuredProductAddResponse"
        "400":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>invalid</td><td>invalidRequest</td><td>Missing
            or invalid Parameters</td></tr><tr><td>invalid</td><td>productAgreementExpired</td><td>Agreement
            duration of this product is expired</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorList"
        "401":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>error</td><td>unAuthorized</td><td>Authorization
            credentials are missing or invalid</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorList"
        "403":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td><td>More
            Info</td></tr><tr><td>invalid</td><td>accessNotConfigured</td><td>The
            request operation is not configured to access this resource</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorList"
        "500":
          description: <table><tr><td>Type</td><td>Code</td><td>Details</td></tr><tr><td>fatal</td><td>serverUnavailable</td><td>The
            request failed due to an internal error</td></tr></table>
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorList"
      x-codegen-request-body-name: UnsecuredProductAddRequest
components:
  schemas:
    UnsecuredProductAddRequest:
      type: object
      properties:
        controlFlowId:
          type: string
          description: Control flow id is used to control the flow for subsequent
            requests in the session..
          example: "2345"
        product:
          $ref: "#/components/schemas/Product"
    Product:
      type: object
      properties:
        creditCardProducts:
          type: array
          items:
            $ref: "#/components/schemas/CreditCardProduct"
        readyCreditProducts:
          type: array
          items:
            $ref: "#/components/schemas/ReadyCreditProduct"
        unsecuredLoanProducts:
          type: array
          items:
            $ref: "#/components/schemas/UnsecuredLoanProduct"
    CreditCardProduct:
      required:
      - productCode
      type: object
      properties:
        productCode:
          type: string
          description: A unique code that identifies the product.
          example: VC830
        sourceCode:
          type: string
          description: A source code to identify the product
          example: WW5ARCE1
        organization:
          type: string
          description: Card issuing organization name
          example: "888"
        logo:
          type: string
          description: Product logo to identify the product
          example: "830,"
        requestCreditShield:
          type: boolean
          description: "Insurance enrollment for outstanding balance on the card.\
            \ Valid values: True and False"
          example: true
        embossName:
          type: string
          description: Name to be embossed on card
          example: Mathew Hyden
        cardPlasticId:
          type: string
          description: "Card plastic id selected by the applicant.This is a reference\
            \ data field. Please use /utilities/referenceData/{plasticId} resource\
            \ to get valid values of this field with descriptions. You can use the\
            \ fieldname as the referenceCode parameter to retrieve the values."
        metroTransportUseFlag:
          type: boolean
          description: Indicates if the card is used for metro transport. Possible
            values are true and false
          example: true
        preferredStatementDay:
          type: number
          description: Applicants preferred statement day for the monthly statement
            generation. Possible values are from 1 to 31
          example: 12
        supplementaryCardRequiredFlag:
          type: boolean
          description: Indicates if the applicant is interested in supplementary card.
            Possible values are true and false
          example: true
        billingAddress:
          type: string
          description: Billing address of applicant
          example: "2"
        cardDeliveryAddress:
          type: string
          description: Card delivery address of applicant
          example: "3"
        pinDeliveryAddress:
          type: string
          description: Delivery address  for card pin of applicant
          example: "2"
        giftCode:
          type: string
          description: A  unique code that identifies the gift offered along with
            the product
          example: gc123
        creditLimitIncreaseIndicator:
          type: boolean
          description: Option  to increase credit limit. Valid values are True and
            False
          example: true
        transactionAlertCode:
          type: string
          description: "Transaction alert code associated with the Credit Card product\
            \ to indicate how the applicant would wish to receive the transaction\
            \ alerts.Please use /utilities/referenceData/{transactionAlertCode} resource\
            \ to get valid values of this field with descriptions. You can use the\
            \ fieldname as the referenceCode parameter to retrive the values."
          example: PREMIUM
        productConsentDetails:
          type: array
          items:
            $ref: "#/components/schemas/ConsentDetails"
        companionCardType:
          type: string
          description: "Companion card type associated with the Credit Card product.\
            \ Companion card is a credit card account that is linked to two different\
            \ credit card networks, thus allowing the customer to earn the benefits\
            \ of whichever one they choose to use at the purchase point."
          example: C
        insurances:
          type: array
          items:
            $ref: "#/components/schemas/Insurance"
        supplementaryCardDetails:
          type: array
          items:
            $ref: "#/components/schemas/SupplementaryCardDetails"
        coBrandDetails:
          $ref: "#/components/schemas/CoBrandDetails"
        introducerDetails:
          $ref: "#/components/schemas/IntroducerDetails"
        cardCollectionBranchCode:
          type: string
          description: Customer can select a branch from where he can collect his
            credit card
          example: "1000"
        promotionCode:
          type: string
          description: Customer can enter a promotion code while applying for a credit
            card.
          example: 45CITIRT
        electronicAgreementSigningFlag:
          type: boolean
          description: Flag to indicate if the customer is agreeing for electronic
            agreement signing.Valid values are true and false.
          example: true
        spouseConsentCreditProductAmount:
          type: number
          description: Requested credit limit amount on which spouse consent was gathered
            during the application processing for the credit card product.The value
            can be more or less than the actual credit limit amount. This is valid
            for current product only and this will expire as soon as the product is
            booked.
          format: double
        cardRepaymentDetails:
          $ref: "#/components/schemas/CardRepaymentDetails"
    IntroducerDetails:
      type: object
      properties:
        introducerId:
          type: string
          description: Unique identifier associated with the introducer who had referred
            the applicant.
        introducerName:
          type: string
          description: Introducer full name who had referred the applicant.
        introducerMobileNumber:
          type: string
          description: Introducer mobile number who had referred the applicant.
    ConsentDetails:
      type: object
      properties:
        consentType:
          type: string
          description: "Products consent types. Ex: bpConsentType,bpPaybackConsentType.This\
            \ a reference data field. Please use /utilities/referenceData/{productConsentType}\
            \ resource to get valid values of this field with descriptions. You can\
            \ use the fieldname as the referenceCode parameter to retrieve the values."
          example: PD
        isConsentGiven:
          type: boolean
          description: "Consent flag. Valid values: True and False"
          example: true
    Insurance:
      type: object
      properties:
        insuranceProductCode:
          type: string
          description: "Credit card insurance product code. Ex: CreditShield and CreditProtect.This\
            \ a reference data field. Please use /utilities/referenceData/{loanInsuranceProduct}\
            \ (for unsecured Loan product) and /utilities/referenceData/{cardInsuranceProduct}\
            \ (for credit card )product resource to get valid values of this field\
            \ with descriptions. You can use the fieldname as the referenceCode parameter\
            \ to retrieve the values."
          example: CreditShield
        insuranceMarketingConsentFlag:
          type: boolean
          description: Insurance Marketing consent flag
          example: true
        beneficiary:
          $ref: "#/components/schemas/Beneficiary"
    Beneficiary:
      type: object
      properties:
        beneficiaryOwner:
          type: string
          description: Beneficiary owner to indicate if the insurance amount is transferred
            to Bank or others
          example: Bank
        dateOfBirth:
          type: string
          description: Beneficiarys date of birth who has been nominated by the applicant
            for the credit card insurance.
          format: date
          example: 0022-10-21
        givenName:
          type: string
          description: Beneficiarys given name who has been nominated by the applicant
            for the credit card insurance.
          example: Diana Hyden
        surname:
          type: string
          description: Beneficiarys surname who has been nominated by the applicant
            for the credit card insurance.
          example: Charles
        idType:
          type: string
          description: Beneficiarys ID type who has been nominated by the applicant
            for the credit card insurance.
          example: IC
        idNumber:
          type: string
          description: Beneficiarys  ID number who has been nominated by the applicant
            for the credit card insurance.
          example: S4225801F
    SupplementaryCardDetails:
      type: object
      properties:
        applicantId:
          type: string
          description: Unique identifier of an applicant
          example: 4225801F
        embossName:
          type: string
          description: Emboss name on the credit card for supplementary card holder
          example: Diana Hyden Junior
        creditLimit:
          type: number
          description: Spend limit amount of the supplementary card holder
          format: double
          example: 2500
        creditLimitPercentage:
          type: string
          description: Credit limit percentage indicated as a percentage of the credit
            limit of the primary card.
          example: "40"
        relationshipWithCardHolder:
          type: string
          description: "Relationship of the supplementary application holder with\
            \ the card holder.This a reference data field. Please use /utilities/referenceData/{relationshipWithPrimary}\
            \ resource to get valid values of this field with descriptions. You can\
            \ use the fieldname as the referenceCode parameter to retrieve the values."
          example: A
        cardCollectionBranchCode:
          type: string
          description: Customer can select a branch from where he can collect his
            credit card
          example: "1000"
    CoBrandDetails:
      type: object
      properties:
        coBrandMemberCode:
          type: string
          description: "Cobrand member code.This is a reference data field. Please\
            \ use /utilities/referenceData/{coBrandMemberCode} resource to get valid\
            \ values of this field with descriptions. You can use the fieldname as\
            \ the referenceCode parameter to retrieve the values."
          example: PD
        coBrandMemberNumber:
          type: string
          description: Cobrand member number
          example: "1234"
        givenName:
          type: string
          description: Given name of the applicant associated with the cobrand card.
          example: Diana Hyden
        surname:
          type: string
          description: Surname of the applicant associated with the cobrand card.
          example: Charles
    ReadyCreditProduct:
      required:
      - productCode
      type: object
      properties:
        productCode:
          type: string
          description: A unique code that identifies the product
          example: VC830
        sourceCode:
          type: string
          description: A source code to identify the product
          example: WW5ARCE1
        organization:
          type: string
          description: Card issuing organization name
          example: "888"
        logo:
          type: string
          description: Product logo to identify the product
          example: "830"
        requestCreditShield:
          type: boolean
          description: "Insurance enrollment for outstanding balance on the card.\
            \ Valid values: True and False"
          example: true
        embossName:
          type: string
          description: Name to be embossed on card
          example: Mathew Hyden
        billingAddress:
          type: string
          description: Billing address of applicant
          example: "2"
        cardDeliveryAddress:
          type: string
          description: Card delivery address of applicant
          example: "3"
        pinDeliveryAddress:
          type: string
          description: Delivery address  for card pin of applicant
          example: "4"
        giftCode:
          type: string
          description: A  unique code that identifies the gift offered along with
            the product
          example: gc123
        creditLimitIncreaseIndicator:
          type: boolean
          description: "Option for to increase credit limit. Valid values: True and\
            \ False"
        atmRequiredFlag:
          type: boolean
          description: "Option to get ATM card along with product. Valid values: True\
            \ and False"
          example: true
        chequeBookRequiredFlag:
          type: boolean
          description: "Option to get cheque book along with product. Valid values:\
            \ True and False"
          example: true
        supplementaryCardDetails:
          type: array
          items:
            $ref: "#/components/schemas/SupplementaryCardDetails"
    UnsecuredLoanProduct:
      required:
      - productCode
      type: object
      properties:
        productCode:
          type: string
          description: A unique code that identifies the product
          example: VC830
        sourceCode:
          type: string
          description: A source code to identify the product
          example: WW5ARCE1
        organization:
          type: string
          description: Card issuing Organisation name
          example: "888"
        logo:
          type: string
          description: Product logo to identify the product
          example: "830"
        requestCreditShield:
          type: boolean
          description: "Insurance enrollment for outstanding balance on the card.\
            \ Valid values: True and False"
          example: true
        billingAddress:
          type: string
          description: Billing address of applicant
          example: "2"
        giftCode:
          type: string
          description: A  unique code that identifies the gift offered along with
            the product
          example: "3"
        requestedLoanAmount:
          type: number
          description: Requested loan amount
          format: double
          example: 2000
        tenure:
          type: string
          description: "Tenure of loan. This a reference data field. Please use /utilities/referenceData/{tenure}\
            \ resource to get valid values of this field with descriptions. You can\
            \ use the fieldname as the referenceCode parameter to retrieve the values."
          example: "24"
        firstInstalmentDate:
          type: string
          description: First instalment date for the unsecured loan product selected
            by the applicant
          format: date
          example: 0022-11-06
        preferredLoanInstalmentDebitDay:
          type: number
          description: Preferred Loan instalment Debit day indicates the preferred
            debit day in the month for the unsecured loan.Possible values are 1 to
            31
          example: 3
        loanDisbursementDetails:
          type: array
          items:
            $ref: "#/components/schemas/LoanDisbursementDetails"
        loanRepaymentDetails:
          $ref: "#/components/schemas/LoanRepaymentDetails"
        introducerDetails:
          $ref: "#/components/schemas/IntroducerDetails"
        insurances:
          type: array
          items:
            $ref: "#/components/schemas/Insurance"
        coApplicantDetails:
          type: array
          items:
            $ref: "#/components/schemas/CoApplicantDetails"
        promotionCode:
          type: string
          description: Customer can enter a promotion code while applying for an unsecured
            loan.
          example: 45CITIRT
        electronicAgreementSigningFlag:
          type: boolean
          description: Flag to indicate if the customer is agreeing for electronic
            agreement signing.Valid values are true and false.
          example: true
        spouseConsentLoanProductAmount:
          type: number
          description: Requested loan amount on which spouse consent was gathered
            during the application processing for the unsecured loan product. The
            value can be more or less than the actual requested loan amount. This
            is valid for current product only and this will expire as soon as the
            product is booked.
          format: double
        transactionAlertCode:
          type: string
          description: "Transaction alert code associated with the Unsecured Loan\
            \ product to indicate how the applicant would wish to receive the transaction\
            \ alerts.This a reference data field. Please use /utilities/referenceData/{transactionAlertCode}\
            \ resource to get valid values of this field with descriptions. You can\
            \ use the fieldname as the referenceCode parameter to retrive the values."
          example: PREMIUM
        debitCardDetails:
          $ref: "#/components/schemas/DebitCardDetails"
    DebitCardDetails:
      type: object
      properties:
        embossName:
          type: string
          description: Emboss name on the Debit card opted by the applicant.
          example: Diana Hyden Junior
    LoanDisbursementDetails:
      type: object
      properties:
        loanDisbursementMethod:
          type: string
          description: "Loan disbursement method for the unsecured loan product selected\
            \ by the applicant.This a reference data field. Please use /utilities/referenceData/{disbursementType}\
            \ resource to get valid values of this field with descriptions. You can\
            \ use the fieldname as the referenceCode parameter to retrieve the valus."
          example: Cash
        remarks:
          type: string
          description: Remarks for the unsecured loan product selected by the applicant
          example: remarks
        beneficiaryAccountNumber:
          type: string
          description: Beneficiarys account number to whom the money would be transferred.
          example: "100265"
        beneficiaryName:
          type: string
          description: Beneficiarys name to whom the money would be transferred.
          example: Hayden
        disbursementAmount:
          type: number
          description: Disbursement Amount to the applicant
          format: double
          example: 2000.5
        currencyCode:
          type: string
          description: Currency code associated with the disbursement Amount.
          example: SGD
        bankDetails:
          $ref: "#/components/schemas/BankDetails"
    BankDetails:
      type: object
      properties:
        bankCode:
          type: string
          description: "Code assigned by a central bank, a bank supervisory body or\
            \ a Bankers Association in a country to all its licensed member banks\
            \ or financial institutions."
        branchCode:
          type: string
          description: Branch Code of the branch which hold the account.
        bankRoutingNumber:
          type: string
          description: Bank routing number is the number used to determine where to
            route funds to or from.
    LoanRepaymentDetails:
      type: object
      properties:
        loanRepaymentMethod:
          type: string
          description: "Loan repayment method for the unsecured loan selected by the\
            \ applicant Ex:SI,PDC,UAE Exchange,Direct Debit,Manual Direct Debit.This\
            \ a reference data field. Please use /utilities/referenceData/{repaymentOption}\
            \ resource to get valid values of this field with descriptions. You can\
            \ use the fieldname as the referenceCode parameter to retrieve the values."
          example: UAE Exchange
        paymentType:
          type: string
          description: "Payment type for the unsecured loan selected by the applicant.Ex:External\
            \ DDA,External Recurring,Internal DDA.This a reference data field. Please\
            \ use /utilities/referenceData/{paymentType} resource to get valid values\
            \ of this field with descriptions. You can use the fieldname as the referenceCode\
            \ parameter to retrieve the values."
          example: External DDA
        directDebitOption:
          type: string
          description: "Direct debit payment option to indicate how much customer\
            \ wants to pay either entire balance amount or minimum amount.This a reference\
            \ data field. Please use /utilities/referenceData/{directDebitOption }\
            \ resource to get valid values of this field with descriptions. You can\
            \ use the fieldname as the referenceCode parameter to retrieve the values.\
            \ Ex:ENTIRE_BALANCE or MINIMUM_AMOUNT"
          example: MINIMUM_AMOUNT
        bankDetails:
          $ref: "#/components/schemas/BankDetails"
        paymentAccountNumber:
          type: string
          description: Payment account number associated with the bank   through which
            the loan repayment is carried out  by the applicant
          example: "1230151"
        accountHolderName:
          type: string
          description: Account holders name associated with the bank  through which
            the loan repayment is carried out  by the applicant
          example: Hayden
        currencyCode:
          type: string
          description: Currency code associated in with the loan amount repayment
            is carried out by the applicant
          example: SGD
    CardRepaymentDetails:
      type: object
      properties:
        cardRepaymentMethod:
          type: string
          description: "Card repayment method for the unsecured loan selected by the\
            \ applicant Ex:SI,PDC,UAE Exchange,Direct Debit,Manual Direct Debit.This\
            \ a reference data field. Please use /utilities/referenceData/{repaymentOption}\
            \ resource to get valid values of this field with descriptions. You can\
            \ use the fieldname as the referenceCode parameter to retrieve the values."
          example: UAE Exchange
        paymentType:
          type: string
          description: "Payment type for the unsecured loan selected by the applicant.Ex:External\
            \ DDA,External Recurring,Internal DDA.This a reference data field. Please\
            \ use /utilities/referenceData/{paymentType} resource to get valid values\
            \ of this field with descriptions. You can use the fieldname as the referenceCode\
            \ parameter to retrieve the values."
          example: External DDA
        directDebitOption:
          type: string
          description: "Direct debit payment option to indicate how much customer\
            \ wants to pay either entire balance amount or minimum amount.This a reference\
            \ data field. Please use /utilities/referenceData/{directDebitOption }\
            \ resource to get valid values of this field with descriptions. You can\
            \ use the fieldname as the referenceCode parameter to retrieve the values.\
            \ Ex:ENTIRE_BALANCE or MINIMUM_AMOUNT"
          example: MINIMUM_AMOUNT
        bankDetails:
          $ref: "#/components/schemas/BankDetails"
        paymentAccountNumber:
          type: string
          description: Payment account number associated with the bank   through which
            the loan repayment is carried out  by the applicant
          example: "1230151"
        accountHolderName:
          type: string
          description: Account holders name associated with the bank  through which
            the loan repayment is carried out  by the applicant
          example: Hayden
        currencyCode:
          type: string
          description: Currency code associated in with the loan amount repayment
            is carried out by the applicant
          example: SGD
    CoApplicantDetails:
      type: object
      properties:
        applicantId:
          type: string
          description: Unique identifier of an applicant
          example: "10231"
        relationshipWithPrimaryApplicant:
          type: string
          description: "Relationship of the coapplicant holder with the primary Applicant.This\
            \ a reference data field. Please use /utilities/referenceData/{relationshipWithPrimary}\
            \ resource to get valid values of this field with descriptions. You can\
            \ use the fieldname as the referenceCode parameter to retrieve the values."
          example: A
    UnsecuredProductAddResponse:
      type: object
      properties:
        applicationId:
          type: string
          description: Unique identifier for the application
          example: "120123"
        productDetails:
          type: array
          items:
            $ref: "#/components/schemas/UnsecuredProduct"
    UnsecuredProduct:
      type: object
      properties:
        productCode:
          type: string
          description: A unique code that identifies the product.
          example: VC830
        addProductStatusDescription:
          type: string

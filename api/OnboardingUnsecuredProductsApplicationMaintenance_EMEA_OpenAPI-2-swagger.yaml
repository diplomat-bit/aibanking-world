  parameters:
    client_id:
      name: client_id
      in: header
      description: The client ID you received while Onboarding with Citi to use these
        API's. This will be generated and shared while registring in the developer
        portal.
      required: true
      style: simple
      explode: false
      schema:
        type: string
    Authorization:
      name: Authorization
      in: header
      description: The Authorization Token
      required: true
      style: simple
      explode: false
      schema:
        type: string
    countryCode:
      name: countryCode
      in: header
      description: Country code in 2 character ISO 3166 format.
      required: false
      style: simple
      explode: false
      schema:
        type: string
    businessCode:
      name: businessCode
      in: header
      description: The 3 character business code. Use GCB for consumer banking.
      required: false
      style: simple
      explode: false
      schema:
        type: string
    uuid:
      name: uuid
      in: header
      description: 128 bit UUID that you generate for every request
      required: true
      style: simple
      explode: false
      schema:
        type: string
    Accept:
      name: Accept
      in: header
      description: Content-Types that are acceptable for the response. Currently we
        support application/json.
      required: true
      style: simple
      explode: false
      schema:
        type: string
    Accept-Language:
      name: Accept-Language
      in: header
      description: List of acceptable human languages for response
      required: false
      style: simple
      explode: false
      schema:
        type: string
    Content-Type:
      name: Content-Type
      in: header
      description: The media type of the body of the request (used with POST and PUT
        requests). Currently we support application/json
      required: false
      style: simple
      explode: false
      schema:
        type: string
    clientDetails:
      name: clientDetails
      in: header
      description: Device and browser information. Refer the developer portal for
        more information. Please ensure the header is base64 encoded
      required: false
      style: simple
      explode: false
      schema:
        type: string
    applicationId:
      name: applicationId
      in: path
      description: The ID of the application.
      required: true
      style: simple
      explode: false
      schema:
        type: string

            $ref: "#/components/schemas/VedaQuestionnaire"
        tuQuestionnaire:
          type: array
          description: Applicable for Hong Kong
          items:
            $ref: "#/components/schemas/TuQuestionnaire"
        bureauRecommendedQuestionnaire:
          type: array
          description: KBA Questionnaire
          items:
            $ref: "#/components/schemas/BureauRecommendedQuestionnaire"
    BureauRecommendedQuestionnaire:
      type: object
      properties:
        questionId:
          type: string
          description: Identifier of the question from the question pool
          example: "1"
        sequenceNumber:
          type: string
          description: Bureau recommended question sequence number which is used in
            request to map a question to a given enquiry
          example: "1"
        questionTextDetails:
          $ref: "#/components/schemas/QuestionTextDetails"
        questionType:
          type: string
          description: "Bureau recommended question type. Possible values are TEXT,NUMBER,AMOUNT,CHOICE\
            \ and LIST.Both Choice and list will have options choice will have Y/N\
            \ as options."
          example: OPTIONS
        dependentQuestionDetails:
          $ref: "#/components/schemas/DependentQuestionDetails"
        bureauRecommendedResponseOptions:
          type: array
          items:
            $ref: "#/components/schemas/BureauRecommendedResponseOption"
    QuestionTextDetails:
      type: object
      properties:
        englishQuestionText:
          type: string
          description: Question text to be displayed to the applicant in English
          example: Question?
        localLanguageQuestionText:
          type: string
          description: Question text to be displayed to the applicant in local Language
          example: Question?
    DependentQuestionDetails:
      type: object
      properties:
        isDependentQuestion:
          type: boolean
          description: Indicates if this question is a dependent question and is associated

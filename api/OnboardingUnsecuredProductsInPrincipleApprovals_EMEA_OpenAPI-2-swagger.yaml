        primaryQuestionId:
          type: string
          description: Primary question id to which the dependent question is tagged
            to. This is only applicable for dependent questions.
          example: "1234"
    BureauRecommendedResponseOption:
      type: object
      properties:
        optionKey:
          type: string
          description: The key of Bureau recommended question
          example: "1"

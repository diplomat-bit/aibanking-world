            $ref: "#/components/schemas/ExamDetails"
    ExamDetails:
      type: object
      properties:
        key:
          type: string
          description: 'Key attribute of the TU questionnaire '
          example: "2"
        title:
          type: string
          description: Exam Title of the TU questionnaire
          example: KBA
        languageCode:
          type: string
          description: "Language code attribute of the TU questionnaire.This a reference\
            \ data field. Please use /utilities/referenceData/{languageCode} resource\
            \ to get valid values of this field with descriptions."
          example: EN
        matchKeyId:
          type: string
          description: Language code attribute of the TU questionnaire
          example: "2"
        errorGeneratingQa:
          type: string
          description: Error generating Question and answers attribute of the TU Questionnaire
          example: "2"
        timeTakenToAnswer:
          type: string
          description: Time taken to answer for the TU questionnaire
          example: "2"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Questions"
    Questions:
      type: object
      properties:
        tuQuestionId:
          type: string
          description: Unique Identifier for the question instance
          example: "1"
        questionId:
          type: string
          description: Identifier of the question from the question pool
          example: "1"
        questionText:
          type: string
          description: TU question text
          example: Question?
        questionType:
          type: string
          description: TU question type
          example: Choice
        dummyQuestionFlag:
          type: boolean

            information
          example: true
        multipleChoiceQuestionFlag:
          type: boolean
          description: Flag to mark if question has multiple choice for answer
          example: true
        listAnswerIndex:
          type: string
          description: Index for the list answer type question
          example: "1"
        expirationTime:
          type: string
          description: Expiration time of the TU question
          format: date-time
        timeTakenToAnswer:
          type: string
          description: Time taken to answer this question by customer
          example: "2"
        answers:
          type: array
          items:
            $ref: "#/components/schemas/Answers"

        sequenceNumber:
          type: string
          description: Identifer used in request to map a question to a given enquiry
          example: "1"
        responseOptions:
          type: array
          items:
            $ref: "#/components/schemas/ResponseOptions"
    FreeTextQuestionnaire:
      type: object
      properties:
        questionText:
          type: string

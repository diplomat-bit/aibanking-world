      type: object
      properties:
        key:
          type: string
          description: Attributes of the TU KBA request
          example: "2"
        answerSelected:
          type: string
          description: Answer selected by the customer
          example: "2"
    ErrorResponse:
      required:
      - code
      - type
      type: object
      properties:
        type:
          type: string
          description: "<br>invalid - Request did not confirm to the specification\
            \ and was unprocessed & rejected. Please fix the value and try again</br>\
            \                         <br>warn - Request was partially processed.\
            \  E.g. some of the fields are missing in response to the system issues,\
            \  request was accepted successfully but will be processed asynchronously</br>\
            \                                                           <br>error\
            \ - The request was accepted but could not be processed successfully</br>\
            \            <br>fatal - There was an internal system error while processing\
            \ the request. These are technical errors and will be resolved by Citi,\
            \ and the consumer should retry after some time. Business errors will\
            \ not be categorized as fatal </br>"
          enum:
          - error
          - warn
          - invalid
          - fatal
        code:
          type: string
          description: Error code which qualifies the error
        details:
          type: string
          description: Human readable explanation specific to the occurrence of the
            problem
        location:
          type: string
          description: The name of the field that resulted in the error
        moreInfo:
          type: object
          properties: {}
          description: URI to human readable documentation of the error
  parameters:
    client_id:
      name: client_id
      in: header
      description: The client ID you received while Onboarding with Citi to use these
        API's. This will be generated and shared while registring in the developer
        portal.
      required: true
      style: simple
      explode: false
      schema:
        type: string
    Authorization:
      name: Authorization
      in: header
      description: The Authorization Token
      required: true
      style: simple
      explode: false
      schema:
        type: string
    countryCode:
      name: countryCode
      in: header
      description: Country code in 2 character ISO 3166 format.
      required: true
      style: simple
      explode: false
      schema:
        type: string
    businessCode:
      name: businessCode
      in: header
      description: The 3 character business code. Use GCB for consumer banking.
      required: false
      style: simple
      explode: false
      schema:
        type: string
    uuid:
      name: uuid
      in: header
      description: 128 bit UUID that you generate for every request
      required: true
      style: simple
      explode: false
      schema:
        type: string
    Accept:
      name: Accept
      in: header
      description: Content-Types that are acceptable for the response. Currently we
        support application/json.
      required: true
      style: simple
      explode: false
      schema:
        type: string
    Accept-Language:
      name: Accept-Language
      in: header
      description: List of acceptable human languages for response
      required: false
      style: simple
      explode: false
      schema:
        type: string
    Content-Type:
      name: Content-Type
      in: header
      description: The media type of the body of the request (used with POST and PUT
        requests). Currently we support application/json
      required: true
      style: simple
      explode: false
      schema:
        type: string
    clientDetails:
      name: clientDetails
      in: header
      description: Device and browser information. Refer the developer portal for
        more information. Please ensure the header is base64 encoded
      required: false
      style: simple
      explode: false
      schema:
        type: string
    x-jws-signature:
      name: x-jws-signature
      in: header
      description: "Signature generated when partner sign API payload.This signature\
        \ will be used to validate that the call is coming from a valid partner. This\
        \ signature is a JWT token, which will be validated with partnerâ€™s JWK stored\
        \ in DB"
      required: false
      style: simple
      explode: false
      schema:
        type: string
    applicationId:
      name: applicationId
      in: path
      description: the ID of the application
      required: true
      style: simple
      explode: false
      schema:
        type: string

    String64:
      title: String 64
      maxLength: 64
      type: string
      description: String of maximum length 64
    ContentTypes:
      title: Content Types
      type: string
      description: Types of document formats. (Suggested values)
      enum:
      - application/json
      - application/pdf
      - application/zip
      - image/gif
      - image/jpeg
      - image/png
      - image/tiff
    ElectronicAddress:
      title: Electronic Address entity
      type: object
      properties:
        emailAddressText:
          type: string
          description: Value of the email address
      description: Electronic address details
    PaymentsResponse:
      title: Payments entity
      type: object
      properties:
        payments:
          type: array
          description: Payments retrieved by the operation
          items:
            $ref: "#/components/schemas/PaymentResponse"
      description: A list of payments
    PayeesResponse:
      title: Merchant entity
      type: object
      properties:
        payees:
          type: array
          items:
            $ref: "#/components/schemas/PayeeResponse"
      description: Payee Information
    PayeeResponse:
      title: Merchant entity
      type: object
      properties:
        merchant:
          $ref: "#/components/schemas/MerchantInfo"
        payeeId:
          $ref: "#/components/schemas/Identifier"
        merchantAccountIds:
          type: array
          description: Account identifier(s) the customer has with the merchant
          example:
          - "88888"
          items:
            type: string
        status:
          $ref: "#/components/schemas/PartyStatus"
        expiresTimestamp:
          $ref: "#/components/schemas/Timestamp"
      description: Business or person to whom bill payments can be sent for products
        or services
    MerchantInfo:
      title: Merchant For Update entity
      type: object
      properties:
        displayName:
          type: string
          example: My Cell Phone Biller
        name:
          type: object
          properties:
            company:
              type: string
              example: Citi
          description: Company Name
        address:
          $ref: "#/components/schemas/MerchantAddress"
        phone:
          $ref: "#/components/schemas/TelephoneNumber"
      description: Merchant's fields to be updated. Describes the fields that can
        be updated by the client. Supported fields could be server dependent
    MerchantAddress:
      description: Customer Address Information
      allOf:
      - type: object
        properties:
          line1:
            $ref: "#/components/schemas/Address/properties/line1"
          city:
            $ref: "#/components/schemas/String64"
          region:
            $ref: "#/components/schemas/String64"
          postalCode:
            type: string
            description: Postal Code
            example: "123456"
    IndividualName:
      title: Individual name
      type: object
      properties:
        first:
          type: string
          description: First name
        middle:
          type: string
          description: Middle initial
        last:
          type: string
          description: Last name
        suffix:
          type: string
          description: Generational or academic suffix
      description: "First name, middle initial, last name, suffix fields"
    CustomerName:
      title: Customer Name entity
      type: object
      description: The name of an individual in their role as a customer
      allOf:
      - $ref: "#/components/schemas/IndividualName"
      - type: object
        properties:
          prefix:
            type: string
            description: "Name prefix, e.g. Mr."
          company:
            type: string
            description: Company name
    DeliveryAddress:
      title: Delivery Address
      type: object
      description: A delivery address and its location type
      allOf:
      - $ref: "#/components/schemas/Address"
      - type: object
        properties:
          type:
            $ref: "#/components/schemas/DeliveryAddressType"
    DeliveryAddressType:
      title: Delivery Address Type
      type: string
      description: The location type of an address
      enum:
      - BUSINESS
      - DELIVERY
      - HOME
      - MAILING
    TelephoneNumberType:
      title: Telephone Number Type
      type: string
      description: Purpose or type of telephone number
      enum:
      - BUSINESS
      - CELL
      - FAX
      - HOME
    TelephoneNumber:
      title: Telephone Number
      type: object
      properties:
        type:
          $ref: "#/components/schemas/TelephoneNumberType"
        country:
          maxLength: 3
          type: string
          description: Country calling codes defined by ITU-T recommendations E.123
            and E.164
        number:
          maxLength: 15
          pattern: \d+
          type: string
          description: Telephone subscriber number defined by ITU-T recommendation
            E.164
      description: Standard for international phone numbers
    PaymentResponse:
      title: Payment entity
      type: object
      description: Represents a payment
      allOf:
      - $ref: "#/components/schemas/PaymentForUpdate"
      - required:
        - paymentId
        - status
        type: object
        properties:
          paymentId:
            $ref: "#/components/schemas/Identifier"
          recurringPaymentId:
            $ref: "#/components/schemas/Identifier"
          processedTimestamp:
            $ref: "#/components/schemas/Timestamp"
          startedProcessingTimestamp:
            $ref: "#/components/schemas/Timestamp"
          status:
            $ref: "#/components/schemas/PaymentStatus"
    DateString:
      title: Date String
      maxLength: 10
      type: string
      description: "ISO 8601 full-date in format 'YYYY-MM-DD' according to [IETF RFC3339](https://xml2rfc.tools.ietf.org/public/rfc/html/rfc3339.html#anchor14)"
      format: date
      example: 2021-07-15
    PaymentForUpdate:
      title: Payment For Update entity
      required:
      - amount
      - dueDate
      - fromAccountId
      - toPayeeId
      type: object
      properties:
        fromAccountId:
          $ref: "#/components/schemas/Identifier"
        toPayeeId:
          $ref: "#/components/schemas/Identifier"
        amount:
          minimum: 0
          type: number
          description: Amount for the payment. Must be positive
        merchantAccountId:
          type: string
          description: User's account identifier with the merchant
        dueDate:
          $ref: "#/components/schemas/DateString"
      description: Payment entity used for creation and update of a payment
    Timestamp:
      title: Timestamp
      type: string
      description: "ISO 8601 date-time in format 'YYYY-MM-DDThh:mm:ss.nnn[Z|[+|-]hh:mm]'\
        \ according to [IETF RFC3339](https://xml2rfc.tools.ietf.org/public/rfc/html/rfc3339.html#anchor14)"
      format: date-time
    RecurringPayment:
      title: Recurring Payment entity
      type: object
      description: A recurring payment. Financial institution is free to adjust the
        payment date to accommodate weekends and holidays
      allOf:
      - $ref: "#/components/schemas/RecurringPaymentForUpdate"
      - required:
        - status
        type: object
        properties:
          recurringPaymentId:
            $ref: "#/components/schemas/Identifier"
          cancelledTimestamp:
            $ref: "#/components/schemas/Timestamp"
          status:
            $ref: "#/components/schemas/RecurringPaymentStatus"
    RecurringPaymentDuration:
      title: Recurring Payment Duration entity
      required:
      - type
      type: object
      properties:
        type:
          $ref: "#/components/schemas/RecurringPaymentDurationType"
        numberOfTimes:
          type: number
          description: Maximum number of times a payment is to be sent. Required if
            type is set to NUMBEROFTIMES
      description: Describes a payment's duration
    RecurringPaymentForUpdate:
      title: Recurring Payment for Update entity
      required:
      - amount
      - dueDate
      - frequency
      - fromAccountId
      - toPayeeId
      type: object
      properties:
        frequency:
          $ref: "#/components/schemas/RecurringPaymentFrequency"
        duration:
          $ref: "#/components/schemas/RecurringPaymentDuration"
        fromAccountId:
          $ref: "#/components/schemas/Identifier"
        toPayeeId:
          $ref: "#/components/schemas/Identifier"
        amount:
          minimum: 0
          type: number
          description: Amount for the payment. Must be positive
        merchantAccountId:
          type: string
          description: User's account identifier with the merchant
        dueDate:
          $ref: "#/components/schemas/DateString"
      description: Used to create or update a recurring payment. Financial institution
        is free to adjust the payment date to accommodate weekends and holidays
    RecurringPayments:
      title: Recurring Payments entity
      type: object
      properties:
        recurringPayments:
          type: array
          description: Recurring payments retrieved by the operation
          items:
            $ref: "#/components/schemas/RecurringPayment"
      description: A list of recurring payments
    HttpAction:
      title: HTTP Action Type
      type: string
      description: HTTP Methods to use for requests
      enum:
      - DELETE
      - GET
      - PATCH
      - POST
      - PUT
    ActorType:
      title: FDX API Actor Type
      type: string
      description: "Indicates whether a customer is present and has requested the\
        \ operation (USER), or if a batch job has requested the operation (BATCH)"
      enum:
      - BATCH
      - USER
    Error:
      title: Error
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          description: Error code defined by FDX API Specification or Data Provider
            indicating the error situation which has occurred
        message:
          type: string
          description: End user displayable information which might help the customer
            diagnose an error
        debugMessage:
          type: string
          description: Message used to debug the root cause of the error. Contents
            should not be used in consumer's business logic. Can change at any time
            and should only be used for consumer to communicate with the data provider
            about an issue. Provider can include an error GUID in message for their
            use.
      description: "An error entity which can be used at the API level for error responses\
        \ or at the account level to indicate a problem specific to a particular account.\
        \ See the error codes and descriptions defined in the latest FDX API Specification\
        \ document, section 6.2 Errors"
    FapiInteractionId:
      title: FAPI Interaction ID
      maxLength: 36
      minLength: 36
      type: string
      description: "Universally unique identifier for this interaction, used across\
        \ all FDX API requests and responses"
      format: uuid
      example: c770aef3-6784-41f7-8e0e-ff5f97bddb3a
    Identifier:
      title: Identifier
      maxLength: 256
      type: string
      description: Value for a unique identifier
    ContactPreferencesType:
      title: Contact Preferences Type
      type: string
      description: Contact Preferences Type
      enum:
      - CELL
      - EMAIL
      - FAX
      - LETTER
      - PHONE
    GovernmentIssuedIdType:
      title: Government Issued ID Type
      type: string
      description: Government Issued ID Type
      enum:
      - DRIVERLICENSE
      - PASSPORT
    PartyStatus:
      title: Party Status
      type: string
      description: |-
        Defines the party lifecycle.
          * `ACTIVE`: Party is ready to participate in money movement
          * `DELETED`: Party has been deleted and will not move into any other state
          * `PENDING`: Party is not yet ready to participate in money movement
          * `REJECTED`: Party was found to be invalid and cannot participate in money movement
      enum:
      - ACTIVE
      - DELETED
      - PENDING
      - REJECTED
    PaymentStatus:
      title: Payment Status
      type: string
      description: |-
        Defines the payment lifecycle.
          * `CANCELLED`: Payment was cancelled by the user
          * `FAILED`: Payment failed for reasons other than "No Funds"
        For example: fraud, invalid payee, source account was closed etc.
          * `NOFUNDS`: Payment failed because of the lack of funds
          * `PROCESSED`: The payment has been executed by the payment service provider
          * `PROCESSING`: Payment is in the process of being executed by the payment service provider
          * `SCHEDULED`: Payment has been scheduled
      enum:
      - CANCELLED
      - FAILED
      - NOFUNDS
      - PROCESSED
      - PROCESSING
      - SCHEDULED
    RecurringPaymentDurationType:
      title: Recurring Payment Duration Type
      type: string
      description: Describes if the recurring payment has an end or will occur a fixed
        number of times
      enum:
      - NOEND
      - NUMBEROFTIMES
    RecurringPaymentFrequency:
      title: Recurring Payment Frequency
      type: string
      description: |-
        Defines how often a payment is made relative to the starting day.
          * `BIWEEKLY`: Every 14 days
          * `TWICEMONTHLY`: Every 15 days
          * `WEEKLY`: Every 7 days
      enum:
      - WEEKLY
      - BIWEEKLY
      - TWICEMONTHLY
      - MONTHLY
      - FOURWEEKS
      - BIMONTHLY
      - QUARTERLY
      - SEMIANNUALLY
      - ANNUALLY
    RecurringPaymentStatus:
      title: Recurring Payment Status
      type: string
      description: |-
        Defines the recurring payment lifecycle
          * `CANCELLED`: Recurring Payment was cancelled by the user
          * `FAILED`: Recurring Payment failed. For example: fraud, invalid payee, source account was closed etc.
          * `PROCESSED`: The scheduled duration of the recurrence has completed
          * `SCHEDULED`: Recurring Payment has been scheduled
      enum:
      - CANCELLED
      - FAILED
      - PROCESSED
      - SCHEDULED
  parameters:
    FapiInteractionIdHeader:
      name: x-fapi-interaction-id
      in: header
      description: Unique identifier for this interaction
      required: true
      style: simple
      explode: false
      schema:
        $ref: "#/components/schemas/FapiInteractionId"
      example: c770aef3-6784-41f7-8e0e-ff5f97bddb3a
    FdxApiActorTypeHeader:
      name: FDX-API-Actor-Type
      in: header
      description: Identifies whether the customer is present (USER) or it is a BATCH
        operation
      required: false
      style: simple
      explode: false
      schema:
        $ref: "#/components/schemas/ActorType"
    LimitQuery:
      name: limit
      in: query
      description: Number of elements that the consumer wishes to receive. Providers
        should implement reasonable default and maximum values
      required: false
      style: form
      explode: true
      schema:
        type: integer
    OffsetQuery:
      name: offset
      in: query
      description: Opaque cursor used by the provider to send the next set of records
      required: false
      style: form
      explode: true
      schema:
        type: string
    UpdatedSinceQuery:
      name: updatedSince
      in: query
      description: Return items that have been created or updated since the nextUpdateId
      required: false
      style: form
      explode: true
      schema:
        $ref: "#/components/schemas/Identifier"
  headers:
    x-fapi-interaction-id:
      description: Unique identifier for this interaction
      style: simple
      explode: false
      schema:
        $ref: "#/components/schemas/FapiInteractionId"
      example: c770aef3-6784-41f7-8e0e-ff5f97bddb3a
  securitySchemes:
    OAuthFapi1Advanced:
      type: oauth2
      description: |-
        This authorization protocol uses FAPI Security Profile 1.0 Part Two — Advanced. To be used with the FDX API customer data domains. In addition, these operations employ the FDX User Consent framework for permissioned data sharing.
        Client must comply with [5.2.3 Confidential client](https://openid.net/specs/openid-financial-api-part-2-1_0.html#confidential-client). Authorization server must comply with the [5.2.2 Authorization server](https://openid.net/specs/openid-financial-api-part-2-1_0.html#authorization-server).
        Client, authorization server and resource server requirements described in full by:
          * [FAPI Security Profile 1.0 Part Two — Advanced](https://openid.net/specs/openid-financial-api-part-2-1_0.html)
          * FDX API Security Model specification published with the FDX API

        Consent User Experience and Issuance described by:
          * FDX User Experience Guidelines published with the FDX API
          * Consent API operations and data structures published within the FDX API
      flows:
        authorizationCode:
          authorizationUrl: https://auth.fi.com/fdx/v6/par
          tokenUrl: https://auth.fi.com/fdx/v6/token
          scopes:
            fdx:accountbasic:read: "Scope authorizing retrieval of account display\
              \ name, masked account number, type, description"
            fdx:accountdetailed:read: "Scope authorizing retrieval of account information.\
              \ Includes data from \"Basic\" + account balances, credit limits, due\
              \ dates, interest rates, rewards balances, recurrences"
            fdx:accountpayments:read: "Deprecated and replaced with `fdx:paymentsupport:read`\
              \ in FDX release V6.1.0, `fdx:accountpayments:read` will be removed\
              \ with V7 release"
            fdx:bills:read: Scope authorizing retrieval of bill payments data
            fdx:customercontact:read: "Scope authorizing retrieval of name, email,\
              \ address, phone on file with this institution. Applies to both user\
              \ and other account holders"
            fdx:customerpersonal:read: "Scope authorizing retrieval of name, email,\
              \ address, phone, DoB, tax ID, SSN on file with this institution"
            fdx:images:read: "Scope authorizing retrieval of check and receipt images,\
              \ which may include PII such as name, full account and routing number"
            fdx:investments:read: Scope authorizing retrieval of details about individual
              underlying investment positions
            fdx:paymentsupport:read: Scope authorizing retrieval of full account number
              and payment network routing number
            fdx:rewards:read: "Scope authorizing retrieval of loyalty rewards programs,\
              \ transactions and balances"
            fdx:statements:read: "Scope authorizing retrieval of periodic PDF statement\
              \ showing personal information, account and transaction details. May\
              \ contain PII such as name, address"
            fdx:tax:read: "Scope authorizing retrieval of information reporting tax\
              \ forms and data, including any PII such as name, address, tax ID and\
              \ account number"
            fdx:transactions:read: "Scope authorizing retrieval of historical and\
              \ current transactions, transaction types, amounts, dates and descriptions"
            offline_access: Scope authorizing the client to refresh `access_tokens`
              without user present
            openid: Scope authorizing access to the user's identity details

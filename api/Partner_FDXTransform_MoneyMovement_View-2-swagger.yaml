openapi: 3.0.0
info:
  title: Partner_FDXTransform_MoneyMovement_View
  description: Financial Data Exchange V6.2.0 Money Movement API
  license:
    name: N/A
  version: 1.0.0
servers:
- url: https://127.0.0.1/api/billmgmt/billpay/v2
paths:
  /fdx/v6/payees:
    get:
      tags:
      - Payee Management
      summary: Search for payees
      description: Search for payees
      operationId: searchForPayees
      parameters:
      - name: Authorization
        in: header
        description: "The most recent authorization token. This will have the format\
          \ Bearer + {space} + {accessToken}. Example: Bearer KGNsaWVudF9pZDpjbGllbnRfc2VjcmV0KQ==."
        required: true
        style: simple
        explode: false
        schema:
          type: string
      - name: Accept
        in: header
        description: Content types that are acceptable for the response. Currently
          we support application/json
        required: true
        style: simple
        explode: false
        schema:
          $ref: "#/components/schemas/ContentTypes"
      - name: x-fapi-interaction-id
        in: header
        description: 128 bit random UUID generated uniquely for every request
        required: true
        style: simple
        explode: false
        schema:
          type: string
          default: 4468adf1-adfe-4f85-a2c1-f29beaa1f6ee
      - name: FDX-API-Actor-Type
        in: header
        description: Request type whether request comes from user or batch
        required: true
        style: simple
        explode: false
        schema:
          type: string
          default: USER
      - name: FinancialId
        in: header
        description: Financial institution's routing number
        required: true
        style: simple
        explode: false
        schema:
          type: string
          default: "123456789"
      - name: FDX-API-Data-Recipient-Id
        in: header
        description: The client ID received during application registration in the
          developer portal.
        required: false
        style: simple
        explode: false
        schema:
          type: string
          default: 1c5f30d9-043c-49ff-b9c4-255a923278b2
      - name: updatedSince
        in: query
        description: Return items that have been created or updated since the nextUpdateId
        required: false
        style: form
        explode: true
        schema:
          $ref: "#/components/schemas/Identifier"
      - name: offsetQuery
        in: query
        description: Opaque cursor used by the provider to send the next set of records
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: limitQuery
        in: query
        description: Number of elements that the consumer wishes to receive. Providers
          should implement reasonable default and maximum values
        required: false
        style: form
        explode: true
        schema:
          type: integer
      responses:
        "200":
          description: Successful operation
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/x-fapi-interaction-id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayeesResponse"
        "400":
          description: When invalid input is sent by client
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/x-fapi-interaction-id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalid input:
                  value:
                    code: "401"
                    message: Invalid Input
                    debugMessage: Input sent by client does not satisfy API specification
        "401":
          description: When Customer with id not found
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/x-fapi-interaction-id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                Customer not found:
                  value:
                    code: "603"
                    message: Authentication failed
                    debugMessage: Request lacks valid authentication credentials for
                      the target resource
        "403":
          description: When customer is not authorized
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/x-fapi-interaction-id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                access not configured:
                  value:
                    code: "602"
                    message: Customer not authorized
                    debugMessage: Authenticated customer does not have the authorization
                      to perform this action
        "500":
          description: Server unavailable
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/x-fapi-interaction-id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                Internal server error:
                  value:
                    code: "500"
                    message: Internal server error
                    debugMessage: The request failed due to an internal error server
                      unavailability
                Internal system unavailable:
                  value:
                    code: "501"
                    message: Subsystem unavaliable
                    debugMessage: The request failed due to an internal error/server
                      unavailability
        "503":
          description: When there is a scheduled maintenance
          headers:
            x-fapi-interaction-id:
              $ref: "#/components/headers/x-fapi-interaction-id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                System down due to maintenance:
                  value:
                    code: "503"
                    message: Scheduled Maintenance
                    debugMessage: System is down for maintenance.
